<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSCELL — Dashboard Semanal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#eee;font-family:Arial,sans-serif;font-size:13px;padding:16px}
h1{color:#cc0000;text-align:center;font-size:18px;letter-spacing:2px;margin-bottom:2px}
.sub{text-align:center;color:#555;font-size:11px;margin-bottom:4px}
.semana-badge{text-align:center;margin-bottom:14px}
.sbadge{display:inline-block;background:#1a0000;border:1px solid #cc0000;color:#cc0000;padding:4px 16px;border-radius:99px;font-size:12px;font-weight:bold;letter-spacing:1px}
#tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 13px;border-radius:4px;border:1px solid #2a2a2a;background:#141414;cursor:pointer;color:#777;font-size:12px;transition:.15s}
.tab.on{background:#cc0000;border-color:#cc0000;color:#fff;font-weight:bold}
.tab:hover:not(.on){border-color:#cc0000;color:#cc0000}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.card{background:#141414;border:1px solid #222;border-radius:7px;padding:12px 14px}
.lb{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.8px}
.vl{font-size:19px;font-weight:bold;margin:3px 0 1px}
.sb{font-size:11px;color:#555}
.box{background:#141414;border:1px solid #1e1e1e;border-radius:7px;padding:14px;margin-bottom:12px}
.bt{font-size:11px;color:#cc0000;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:bold}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
th{background:#111;color:#cc0000;padding:7px 8px;text-align:left;border-bottom:1px solid #222;font-size:10px;text-transform:uppercase;letter-spacing:.6px}
td{padding:6px 8px;border-bottom:1px solid #181818}
tr:hover td{background:#161616}
.g{color:#2ecc71;font-weight:bold}.r{color:#e74c3c;font-weight:bold}.y{color:#f39c12;font-weight:bold}.d{color:#444}
.bdg{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:bold;display:inline-block}
.bg{background:#1a3a25;color:#2ecc71}.br2{background:#3a1515;color:#e74c3c}.by{background:#3a2a08;color:#f39c12}.bp{background:#1a1a3a;color:#7799ff}
.ins{background:#141414;border-left:3px solid #cc0000;padding:8px 12px;border-radius:0 5px 5px 0;margin-bottom:8px;font-size:12px;line-height:1.6;color:#bbb}
.ins.gr{border-left-color:#2ecc71}.ins.ye{border-left-color:#f39c12}.ins.re{border-left-color:#e74c3c}
.ins strong{color:#eee}
.loja-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.lbtn{padding:6px 14px;border-radius:4px;border:1px solid #333;background:#111;cursor:pointer;color:#888;font-size:11px;transition:.15s}
.lbtn.on{border-color:#cc0000;background:#1a0000;color:#cc0000;font-weight:bold}
.lbtn:hover:not(.on){border-color:#cc0000;color:#cc0000}
.prog-wrap{background:#1a1a1a;border-radius:3px;height:26px;position:relative;overflow:hidden;margin-bottom:6px}
.prog-real{position:absolute;left:0;top:0;height:100%;background:#e74c3c;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden}
.prog-proj{position:absolute;top:0;height:100%;background:repeating-linear-gradient(45deg,#7a5500,#7a5500 4px,#5a3a00 4px,#5a3a00 8px);display:flex;align-items:center;padding-left:6px;font-size:10px;color:#f39c12;white-space:nowrap;overflow:hidden}
.prog-meta{position:absolute;top:0;height:100%;width:2px;background:rgba(255,255,255,.4)}
.prog-lbl{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#aaa;pointer-events:none}
.alerta{background:#1a0800;border:1px solid #cc4400;border-radius:6px;padding:10px 14px;margin-bottom:8px;font-size:12px;line-height:1.6}
.alerta.ok{background:#001a08;border-color:#007733}
.alerta.warn{background:#1a1000;border-color:#cc8800}
.semrow{display:flex;gap:6px;margin-bottom:8px}
.semcell{flex:1;border-radius:5px;padding:8px;text-align:center;font-size:11px}
.semcell.real{background:#1a1a1a;border:1px solid #333}
.semcell.proj{background:#1a1000;border:1px solid #5a3a00}
.semcell.future{background:#0d0d0d;border:1px dashed #2a2a2a}
.semcell .slbl{font-size:9px;color:#555;text-transform:uppercase;margin-bottom:4px}
.semcell .sval{font-size:14px;font-weight:bold}
.semcell .spct{font-size:10px;margin-top:2px}
</style>
</head>

<script>
/* =========== DADOS DO MÊS ATUAL =========== */
/* ===== DADOS_START ===== */
const MES_ATUAL = 'Junho';
const SEM_ATUAL = 3;
const META_MES_GERAL = 210000;
const DIAS_POR_SEMANA = [6,6,6,8];

const GERAL = {
  s: [
    {n:'S1', fat:52779, meta:63000, real:true},
    {n:'S2', fat:58296, meta:42000, real:true},
    {n:'S3', fat:58960, meta:52500, real:true},
    {n:'S4', fat:69977, meta:52500, real:false},
  ],
  fat_real: 170035,
  fat_proj: 69977,
  meta: 210000,
  tm_real: (97.99+110.68+104.13)/3,
  orc_real: 419+437+427,
};
GERAL.fat_total_proj = GERAL.fat_real + GERAL.fat_proj;

const LOJAS = {
  'Esteio': {
    meta:45000, tm:[89.63,113.66,107.60], orc:235,
    s_real:[11208,12677,10012], s_meta:[13500,9000,11250,11250],
    hist_s3:[8093,5165,12109,6037,5913], hist_s4:[7686,8282,12032,3904,14788],
    prodMetaMes:25000, servMetaMes:20000,
    prodSReal:[7708,8752,7748], prodSMeta:[7500,5000,6250,6250],
    servSReal:[3500,3925,2265], servSMeta:[6000,4000,5000,5000]
  },
  'Esteio Shop.': {
    meta:35000, tm:[128.53,72.49,107.73], orc:217,
    s_real:[9591,6809,12928], s_meta:[10500,7000,8750,8750],
    hist_s3:[5009,3949,7177,7681,9768], hist_s4:[6802,4396,7144,6178,6770],
    prodMetaMes:31000, servMetaMes:4000,
    prodSReal:[8976,5364,8059], prodSMeta:[9300,6200,7750,7750],
    servSReal:[615,1445,4869], servSMeta:[1200,800,1000,1000]
  },
  'Canoas': {
    meta:35000, tm:[78.51,117.41,110.44], orc:265,
    s_real:[9047,11965,11442], s_meta:[10500,7000,8750,8750],
    hist_s3:[5679,3994,9190,8823,10778], hist_s4:[12346,9012,10437,10840,11767],
    prodMetaMes:22000, servMetaMes:13000,
    prodSReal:[7302,10215,9387], prodSMeta:[6600,4400,5500,5500],
    servSReal:[1745,1750,2055], servSMeta:[3900,2600,3250,3250]
  },
  'Avenida': {
    meta:15000, tm:[144.11,102.50,165.34], orc:107,
    s_real:[5058,5301,9156], s_meta:[4500,3000,3750,3750],
    hist_s3:[3013,3872,3404,2069,3647], hist_s4:[3294,3660,2159,2895,8512],
    prodMetaMes:7500, servMetaMes:7500,
    prodSReal:[4323,3177,7756], prodSMeta:[2250,1500,1875,1875],
    servSReal:[735,2124,1400], servSMeta:[2250,1500,1875,1875]
  },
  'Parque': {
    meta:45000, tm:[70.56,106.90,87.23], orc:275,
    s_real:[6822,12429,9747], s_meta:[13500,9000,11250,11250],
    hist_s3:[10531,4147,10007,7151,10927], hist_s4:[7049,6257,7626,4449,14574],
    prodMetaMes:33000, servMetaMes:12000,
    prodSReal:[5222,11759,7938], prodSMeta:[9900,6600,8250,8250],
    servSReal:[1600,670,1809], servSMeta:[3600,2400,3000,3000]
  },
  'Gravataí': {
    meta:35000, tm:[113.30,126.90,59.26], orc:184,
    s_real:[11054,9115,5675], s_meta:[10500,7000,8750,8750],
    hist_s3:[6368,3771,7425,10971,5905], hist_s4:[5589,8094,10310,5936,8164],
    prodMetaMes:20000, servMetaMes:15000,
    prodSReal:[7624,7360,3575], prodSMeta:[6000,4000,5000,5000],
    servSReal:[3430,1755,2100], servSMeta:[4500,3000,3750,3750]
  },
};

const NOMES = Object.keys(LOJAS);
let curLoja = 'Esteio', curTab = 'anual';

// Calcular projecao por loja (60% ritmo diario atual + 40% historico diario, ajustado por dias reais)
Object.keys(LOJAS).forEach(function(n){
  var l = LOJAS[n];
  l.fat_real = l.s_real.reduce(function(a,b){return a+b;},0);
  var diasRealizados = 0;
  for(var di=0; di<SEM_ATUAL; di++){ diasRealizados += (DIAS_POR_SEMANA[di]||6); }
  var ritmoDiario = diasRealizados > 0 ? l.fat_real / diasRealizados : 0;
  var avg3 = l.hist_s3.reduce(function(a,b){return a+b;},0)/l.hist_s3.length;
  var avg4 = l.hist_s4.reduce(function(a,b){return a+b;},0)/l.hist_s4.length;
  var avg3PorDia = avg3 / 6;
  var avg4PorDia = avg4 / 6;
  var diasS3 = DIAS_POR_SEMANA[2]||6;
  var diasS4 = DIAS_POR_SEMANA[3]||6;
  l.proj_s3 = SEM_ATUAL >= 3 ? l.s_real[2] : Math.round((ritmoDiario*0.60 + avg3PorDia*0.40) * diasS3);
  l.proj_s4 = SEM_ATUAL >= 4 ? l.s_real[3] : Math.round((ritmoDiario*0.60 + avg4PorDia*0.40) * diasS4);
  l.fat_proj  = (SEM_ATUAL < 3 ? l.proj_s3 : 0) + (SEM_ATUAL < 4 ? l.proj_s4 : 0);
  l.fat_total = l.fat_real + l.fat_proj;
  l.tm_atual  = l.tm.reduce(function(a,b){return a+b;},0)/l.tm.length;
  l.pct_meta  = Math.round(l.fat_real/l.meta*100);
  l.pct_proj  = Math.round(l.fat_total/l.meta*100);
  l.prodRealAcum = (l.prodSReal||[]).reduce(function(a,b){return a+b;},0);
  l.servRealAcum = (l.servSReal||[]).reduce(function(a,b){return a+b;},0);
});

const REAL_MESES = [
  {m:'Janeiro',  fat:166737, meta:205000, fechado:true},
  {m:'Fevereiro',fat:145524, meta:205000, fechado:true},
  {m:'Marco',    fat:191180, meta:205000, fechado:true},
  {m:'Abril',    fat:220383, meta:210000, fechado:true},
  {m:'Maio',     fat:251613, meta:210000, fechado:true},
  {m:'Junho', fat:170035, meta:210000, fechado:false, parcial:true}
];

const JUNHO_PROJ_TOTAL = GERAL.fat_total_proj;

const PROJ_2SEM = [
  {m:'Julho', meta:210000, r:250806, o:259933},
  {m:'Agosto', meta:210000, r:267156, o:287604},
  {m:'Setembro', meta:210000, r:284224, o:317288},
  {m:'Outubro', meta:210000, r:302039, o:349123},
  {m:'Novembro', meta:210000, r:320633, o:383256},
  {m:'Dezembro', meta:250000, r:340037, o:419845}
];
/* ===== DADOS_END ===== */

/* =========== HELPERS =========== */
function f(v){return Math.round(v).toLocaleString('pt-BR');}
function fr(v){return 'R '+f(v);}
function pct(r,m){return Math.round(r/m*100);}
function cor(r,m){
  var p = r/m;
  if(p >= 1.00) return '#2ecc71';   // 100%+ verde total
  if(p >= 0.95) return '#5dca6a';   // 95-99% verde claro
  if(p >= 0.88) return '#a8c835';   // 88-94% verde amarelado
  if(p >= 0.80) return '#f0c020';   // 80-87% amarelo
  if(p >= 0.70) return '#f39c12';   // 70-79% laranja
  return '#e74c3c';                  // abaixo 70% vermelho
}
// Gera o estilo CSS (background + background-size) para a barra preenchida ter um gradiente
// vermelho->verde que se "revela" conforme o progresso real em relação a META (nao a largura visual).
// Em baixo % da meta, mostra so o trecho vermelho do gradiente; conforme se aproxima de 100%,
// vai revelando mais do gradiente até o verde. Em 100%+, fica verde solido.
function estiloGradienteBarra(r, m){
  var pctMeta = Math.max(1, Math.min(r/m*100, 100)); // % da meta, entre 1 e 100
  if(r/m >= 1.00){
    return 'background:#2ecc71';
  }
  var escala = 10000 / pctMeta; // quanto menor o %, mais "esticado" o gradiente, revelando so o inicio
  return 'background:linear-gradient(90deg,#e74c3c 0%,#f39c12 55%,#f0c020 75%,#a8c835 87%,#5dca6a 95%,#2ecc71 100%);'
       + 'background-size:'+escala+'% 100%;background-position:left center';
}
// Borda do card/box: fica verde quando a meta foi batida, neutra caso contrario
function bordaMeta(r,m){
  return (r>=m) ? '#1a6e3a' : '#1e1e1e';
}
function bdg(r,m){
  if(r>=m)return '<span class="bdg bg">✓ META</span>';
  if(r/m>.85)return '<span class="bdg by">⚠ PERTO</span>';
  return '<span class="bdg br2">✗ ABAIXO</span>';
}
function bdgProj(r,m){
  if(r>=m)return '<span class="bdg bg">✓ Proj. META</span>';
  if(r/m>.85)return '<span class="bdg by">⚠ Proj. perto</span>';
  return '<span class="bdg br2">✗ Proj. abaixo</span>';
}
function semBar(fat_real, fat_proj, meta){
  // maxV agora cresce dinamicamente com o real, permitindo a barra continuar somando alem da meta
  var maxV = Math.max(fat_real+fat_proj, meta)*1.05;
  var pr = Math.min(fat_real/maxV*100,100);
  var pp = Math.min(fat_proj/maxV*100, 100-pr);
  var pm = Math.min(meta/maxV*100,100);
  var total = fat_real+fat_proj;
  var estiloBar = estiloGradienteBarra(fat_real, meta);
  var cTotal = cor(total, meta);

  // Marcacoes de checkpoint: acumulado esperado ao fim de S1, S2 e S3 (1/4, 2/4, 3/4 da meta)
  var marcas = '';
  [1,2,3].forEach(function(s){
    var metaAcumS = meta * (s/4);
    var pS = Math.min(metaAcumS/maxV*100,100);
    var atingiu = fat_real >= metaAcumS;
    marcas += '<div style="position:absolute;top:-3px;left:'+pS+'%;width:1px;height:28px;background:'+(atingiu?'#5dca6a':'rgba(255,255,255,.45)')+'"></div>'
            + '<div style="position:absolute;top:-13px;left:'+pS+'%;transform:translateX(-50%);font-size:8px;color:'+(atingiu?'#5dca6a':'#999')+'">S'+s+'</div>';
  });

  return '<div class="prog-wrap" style="overflow:visible;margin-top:14px">'
    +'<div class="prog-real" style="width:'+pr+'%;'+estiloBar+'">'+(fat_real>0?fr(fat_real):'')+'</div>'
    +'<div class="prog-proj" style="left:'+pr+'%;width:'+pp+'%">'+(fat_proj>0?'+'+fr(fat_proj)+' proj.':'')+'</div>'
    +'<div class="prog-meta" style="left:'+pm+'%"></div>'
    + marcas
    +'<div class="prog-lbl" style="color:'+cTotal+'">'+pct(total,meta)+'% → '+fr(total)+'</div>'
    +'</div>';
}
function barSimples(lbl, real, meta, maxV, proj, note){
  if(real===undefined||real===null)return '';
  var pr=Math.min(real/maxV*100,100);
  var pp=proj?Math.min(proj/maxV*100,100-pr):0;
  var pm=Math.min(meta/maxV*100,100);
  var total=real+(proj||0);
  // Verde escuro quando a projecao total supera a meta - destaque extra de "vai bater"
  var corBar = (total > meta) ? '#1a8a4a' : cor(total,meta);
  var textoLabel = note || (pct(total,meta)+'% → '+fr(total));
  return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
    +'<div style="width:90px;font-size:11px;color:#999;text-align:right;flex-shrink:0">'+lbl+'</div>'
    +'<div style="flex:1;background:#1a1a1a;border-radius:3px;height:22px;position:relative;overflow:visible">'
    +'<div style="position:absolute;left:0;top:0;height:100%;width:'+pr+'%;background:'+corBar+';display:flex;align-items:center;padding-left:6px;font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden;border-radius:3px 0 0 3px">'+fr(real)+'</div>'
    +(proj?'<div style="position:absolute;left:'+pr+'%;top:0;height:100%;width:'+pp+'%;background:repeating-linear-gradient(45deg,#7a5500,#7a5500 3px,#5a3a00 3px,#5a3a00 6px)"></div>':'')
    +'<div style="position:absolute;top:0;left:'+pm+'%;height:100%;width:2px;background:rgba(255,255,255,.6);box-shadow:0 0 2px rgba(255,255,255,.4)"></div>'
    +'<div style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:#ddd;font-weight:bold;text-shadow:0 1px 2px #000">'+textoLabel+'</div>'
    +'</div></div>';
}
// Mini-barra para Produto/Servico individuais — gradiente, cresce alem de 100%, com checkpoints S1/S2/S3
function miniBarProdServ(lbl, real, meta){
  var safemeta = Math.max(meta,1);
  var maxV = Math.max(real, safemeta) * 1.05;
  var pr = Math.min(real/maxV*100, 100);
  var pm = Math.min(safemeta/maxV*100, 100);
  var bateu = real >= safemeta;
  var estiloBar = estiloGradienteBarra(real, safemeta);
  var corLbl = bateu ? '#5dca6a' : '#888';

  var marcas = '';
  [1,2,3].forEach(function(s){
    var metaAcumS = safemeta * (s/4);
    var pS = Math.min(metaAcumS/maxV*100,100);
    var atingiu = real >= metaAcumS;
    marcas += '<div style="position:absolute;top:0;left:'+pS+'%;width:1px;height:100%;background:'+(atingiu?'rgba(93,202,106,.7)':'rgba(255,255,255,.3)')+'"></div>';
  });

  return '<div style="margin-bottom:10px">'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<div style="width:64px;font-size:11px;color:#999;text-align:right;flex-shrink:0">'+lbl+'</div>'
    +'<div style="flex:1;background:#1a1a1a;border-radius:3px;height:18px;position:relative;overflow:hidden;border:1px solid '+(bateu?'#1a6e3a':'transparent')+'">'
    +'<div style="position:absolute;left:0;top:0;height:100%;width:'+pr+'%;'+estiloBar+';display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden">'+fr(real)+'</div>'
    + marcas
    +'<div style="position:absolute;top:0;left:'+pm+'%;height:100%;width:2px;background:rgba(255,255,255,.5)"></div>'
    +'<div style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;color:'+corLbl+'">'+(bateu?'🎯 ':'')+pct(real,safemeta)+'% de '+fr(safemeta)+'</div>'
    +'</div></div></div>';
}


/* =========== FUNCAO SEMANAS GERAL =========== */
function buildSemGeral(){
  // Calcular saldo acumulado das semanas reais
  var saldoAcum = 0;
  GERAL.s.forEach(function(s){ if(s.real) saldoAcum += (s.meta - s.fat); });
  var futuras = GERAL.s.filter(function(s){ return !s.real; });
  var nFuturas = futuras.length;
  var deficitPorSem = nFuturas > 0 ? saldoAcum / nFuturas : 0;

  var html = '';
  GERAL.s.forEach(function(s, idx){
    var c = s.real ? cor(s.fat,s.meta) : '#f39c12';
    var tipoLabel = s.real ? '\u2713 real' : 'projetado';

    // Bloco superior: faturamento
    var topBloco = '<div class="semcell ' + (s.real?'real':'proj') + '" style="margin-bottom:6px">'
      + '<div class="slbl">' + s.n + ' ' + tipoLabel + '</div>'
      + '<div class="sval" style="color:' + c + '">' + fr(s.fat) + '</div>'
      + '<div class="spct" style="color:' + c + '">' + pct(s.fat,s.meta) + '% meta</div>'
      + '<div style="font-size:9px;color:#555;margin-top:2px">meta orig.: ' + fr(s.meta) + '</div>'
      + '</div>';

    // Bloco inferior: resultado ou alvo
    var botBloco = '';
    if(s.real){
      var diff = s.fat - s.meta;
      if(diff >= 0){
        botBloco = '<div style="background:#001a08;border:1px solid #1a6e3a;border-radius:5px;padding:8px;text-align:center">'
          + '<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">Resultado</div>'
          + '<div style="font-size:14px;font-weight:bold;color:#2ecc71">\uD83C\uDFAF Meta batida</div>'
          + '<div style="font-size:11px;color:#2ecc71;margin-top:3px">+' + fr(diff) + ' acima</div>'
          + '</div>';
      } else {
        botBloco = '<div style="background:#1a0800;border:1px solid #7a2200;border-radius:5px;padding:8px;text-align:center">'
          + '<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">Resultado</div>'

          + '<div style="font-size:10px;color:#7a3a2a;margin-top:3px">redistribuido nas proximas</div>'
          + '</div>';
      }
    } else {
      var alvo    = s.meta + deficitPorSem;
      var diasSemana = DIAS_POR_SEMANA[idx] || 6;
      var alvoDia = Math.ceil(alvo / diasSemana);
      var temDef  = deficitPorSem > 0;
      var temSob  = deficitPorSem < 0;
      var corA  = temDef ? '#f39c12' : (temSob ? '#2ecc71' : '#eee');
      var bgA   = temDef ? '#1a1000' : (temSob ? '#001508' : '#141414');
      var bdA   = temDef ? '#7a5500' : (temSob ? '#1a5e2a' : '#2a2a2a');
      var label = temDef
        ? ('Meta + deficit (' + fr(Math.round(deficitPorSem)) + ')')
        : (temSob ? ('Meta - sobra (' + fr(Math.round(Math.abs(deficitPorSem))) + ')') : 'Meta da semana');
      botBloco = '<div style="background:' + bgA + ';border:1px solid ' + bdA + ';border-radius:5px;padding:8px;text-align:center">'
        + '<div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">' + label + '</div>'
        + '<div style="font-size:15px;font-weight:bold;color:' + corA + '">' + fr(Math.round(alvo)) + '</div>'
        + '<div style="font-size:9px;color:#555;margin-top:5px;border-top:1px solid ' + bdA + ';padding-top:5px">Por dia util (div ' + diasSemana + ')</div>'
        + '<div style="font-size:14px;font-weight:bold;color:' + corA + ';margin-top:2px">' + fr(alvoDia) + '/dia</div>'
        + '</div>';
    }

    html += '<div style="flex:1;min-width:130px">' + topBloco + botBloco + '</div>';
  });
  return html;
}

/* =========== FUNÇÃO SEMANAS POR LOJA =========== */
function buildSemLoja(l){
  // Saldo acumulado das semanas reais
  let saldo = 0;
  l.s_real.forEach(function(v,i){ saldo += (l.s_meta[i] - v); });
  var semanasRestantes = Math.max(1, 4 - SEM_ATUAL); // quantas semanas ainda faltam (S3,S4 -> pode ser 2,1 ou 0)
  var ajuste = saldo / semanasRestantes;

  // Bloco inferior para semana REAL
  function blocoReal(v, meta){
    var diff = v - meta;
    if(diff >= 0){
      return '<div style="background:#001a08;border:1px solid #1a6e3a;border-radius:5px;padding:8px;text-align:center">'
        + '<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">Resultado</div>'
        + '<div style="font-size:14px;font-weight:bold;color:#2ecc71">🎯 Meta batida</div>'
        + '<div style="font-size:11px;color:#2ecc71;margin-top:3px">+' + fr(diff) + ' acima</div>'
        + '</div>';
    } else {
      return '<div style="background:#1a0800;border:1px solid #7a2200;border-radius:5px;padding:8px;text-align:center">'
        + '<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">Resultado</div>'
        + '<div style="font-size:14px;font-weight:bold;color:#e74c3c">Faltou ' + fr(Math.abs(diff)) + '</div>'
        + '<div style="font-size:10px;color:#7a3a2a;margin-top:3px">redistribuído nas próximas</div>'
        + '</div>';
    }
  }

  // Bloco inferior para semana FUTURA com ajuste
  function blocoFutura(metaOrig, ajustePorSem, idxSemana){
    var alvo    = metaOrig + ajustePorSem;
    var diasSemana = DIAS_POR_SEMANA[idxSemana] || 6;
    var alvoDia = Math.ceil(alvo / diasSemana);
    var temDef  = ajustePorSem > 0;
    var temSob  = ajustePorSem < 0;
    var corA  = temDef ? '#f39c12' : (temSob ? '#2ecc71' : '#eee');
    var bgA   = temDef ? '#1a1000' : (temSob ? '#001508' : '#141414');
    var bdA   = temDef ? '#7a5500' : (temSob ? '#1a5e2a' : '#2a2a2a');
    var label = temDef
      ? ('Meta + déficit (' + fr(Math.round(ajustePorSem)) + ')')
      : (temSob ? ('Meta - sobra (' + fr(Math.round(Math.abs(ajustePorSem))) + ')') : 'Meta da semana');
    return '<div style="background:' + bgA + ';border:1px solid ' + bdA + ';border-radius:5px;padding:8px;text-align:center">'
      + '<div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">' + label + '</div>'
      + '<div style="font-size:15px;font-weight:bold;color:' + corA + '">' + fr(Math.round(alvo)) + '</div>'
      + '<div style="font-size:9px;color:#555;margin-top:5px;border-top:1px solid ' + bdA + ';padding-top:5px">Por dia útil (÷ ' + diasSemana + ')</div>'
      + '<div style="font-size:14px;font-weight:bold;color:' + corA + ';margin-top:2px">' + fr(alvoDia) + '/dia</div>'
      + '</div>';
  }

  // Montar HTML de cada semana
  var html = '<div class="semrow" style="flex-wrap:wrap;gap:10px">';

  // Semanas reais (S1, S2)
  l.s_real.forEach(function(v,i){
    var c = cor(v, l.s_meta[i]);
    html += '<div style="flex:1;min-width:130px">'
      + '<div class="semcell real" style="margin-bottom:6px">'
      + '<div class="slbl">S' + (i+1) + ' \u2713 real</div>'
      + '<div class="sval" style="color:' + c + '">' + fr(v) + '</div>'
      + '<div class="spct" style="color:' + c + '">' + pct(v,l.s_meta[i]) + '% meta</div>'
      + '<div style="font-size:9px;color:#555;margin-top:2px">meta orig.: ' + fr(l.s_meta[i]) + '</div>'
      + '</div>'
      + blocoReal(v, l.s_meta[i])
      + '</div>';
  });

  // Semanas projetadas — apenas as que ainda NAO sao reais (posicao >= SEM_ATUAL)
  var projsTodos = [l.proj_s3, l.proj_s4];
  projsTodos.forEach(function(v,i){
    var idxSemana = i+2; // 2 = S3, 3 = S4
    if(idxSemana < SEM_ATUAL) return; // essa semana ja e real, ja foi mostrada acima
    var metaO = l.s_meta[idxSemana];
    var cP = '#f39c12';
    html += '<div style="flex:1;min-width:130px">'
      + '<div class="semcell proj" style="margin-bottom:6px">'
      + '<div class="slbl">S' + (idxSemana+1) + ' projetado</div>'
      + '<div class="sval" style="color:' + cP + '">' + fr(v) + '</div>'
      + '<div class="spct" style="color:' + cP + '">' + pct(v,metaO) + '% meta</div>'
      + '<div style="font-size:9px;color:#555;margin-top:2px">meta orig.: ' + fr(metaO) + '</div>'
      + '</div>'
      + blocoFutura(metaO, ajuste, idxSemana)
      + '</div>';
  });

  html += '</div>';
  return html;
}

  const pctAnoReal = Math.round(fatAnoComMesAtual/META_ANO_LOCAL*100);
  const pctAnoProjR = Math.round(anoRealista/META_ANO_LOCAL*100);

  // Pior e melhor mês fechado, para dar contexto de variação
  const piorMes = mesesFechados.reduce((a,b)=>pct(a.fat,a.meta)<pct(b.fat,b.meta)?a:b);
  const melhorMes = mesesFechados.reduce((a,b)=>pct(a.fat,a.meta)>pct(b.fat,b.meta)?a:b);

  if(pctAnoProjR >= 100){
    alertasAnual.push({tipo:'gr', msg:`<strong>📊 Ritmo anual:</strong> no cenário realista o ano projeta ${fr(anoRealista)} (${pctAnoProjR}% da meta de R$ 3M). No caminho certo, mas qualquer mês fraco como ${piorMes.m} (${pct(piorMes.fat,piorMes.meta)}% da meta) compromete a margem.`});
  } else if(pctAnoProjR >= 90){
    alertasAnual.push({tipo:'ye', msg:`<strong>📊 Ritmo anual:</strong> cenário realista projeta ${fr(anoRealista)} (${pctAnoProjR}% da meta). Falta ${fr(META_ANO_LOCAL-anoRealista)} — o 2º semestre precisa repetir o nível de ${melhorMes.m} com consistência, não só em um mês isolado.`});
  } else {
    alertasAnual.push({tipo:'re', msg:`<strong>📊 Ritmo anual:</strong> cenário realista projeta apenas ${pctAnoProjR}% da meta anual (${fr(anoRealista)}). Para chegar perto de R$ 3M, o ritmo do 2º semestre precisa ficar próximo do cenário otimista (${fr(anoOtimista)}), o que exige ação deliberada — não é algo que acontece sozinho.`});
  }

  /* ============================================================
     CAMADA 2 — MENSAL: ritmo do mês atual, comparado a meses fechados
  ============================================================ */
  const pctMesProj = pct(GERAL.fat_total_proj, META_MES_GERAL);
  const semanasRestantes = 4 - SEM_ATUAL;
  const tmMedioMesesFechados = mesesFechados.length>0
    ? mesesFechados.reduce((a,m)=>a+(m.fat/4),0)/mesesFechados.length / 1000 // proxy grosseiro, so para tendencia
    : 0;

  if(pctMesProj >= 100){
    alertasMensal.push({tipo:'gr', msg:`<strong>📅 ${MES_ATUAL}:</strong> projeção de ${fr(GERAL.fat_total_proj)} (${pctMesProj}% da meta), com ${semanasRestantes} semana${semanasRestantes===1?'':'s'} restante${semanasRestantes===1?'':'s'}. Mês praticamente garantido — manter o ritmo.`});
  } else if(pctMesProj >= 90){
    alertasMensal.push({tipo:'ye', msg:`<strong>📅 ${MES_ATUAL}:</strong> projeção em ${pctMesProj}% da meta. Falta ${fr(META_MES_GERAL-GERAL.fat_total_proj)} para bater — totalmente recuperável em ${semanasRestantes===0?'nenhuma semana (mês já encerrado)':semanasRestantes+' semana(s) restante(s)'}.`});
  } else {
    alertasMensal.push({tipo:'re', msg:`<strong>📅 ${MES_ATUAL}:</strong> projeção em apenas ${pctMesProj}% da meta (${fr(GERAL.fat_total_proj)} de ${fr(META_MES_GERAL)}). Com ${semanasRestantes} semana(s) restante(s), recuperar isso exige reforço real, não só manter o ritmo atual.`});
  }

  // Comparar ticket médio do mês com a tendência dos últimos meses fechados (se houver dado suficiente)
  if(mesesFechados.length >= 2){
    const ultimoFechado = mesesFechados[mesesFechados.length-1];
    const penultimoFechado = mesesFechados[mesesFechados.length-2];
    if(ultimoFechado.fat > penultimoFechado.fat * 1.05){
      alertasMensal.push({tipo:'gr', msg:`Faturamento vem em trajetória de alta: ${penultimoFechado.m} (${fr(penultimoFechado.fat)}) → ${ultimoFechado.m} (${fr(ultimoFechado.fat)}). Se ${MES_ATUAL} mantiver isso, o trimestre fecha forte.`});
    } else if(ultimoFechado.fat < penultimoFechado.fat * 0.92){
      alertasMensal.push({tipo:'ye', msg:`Atenção: ${ultimoFechado.m} caiu em relação a ${penultimoFechado.m} (${fr(penultimoFechado.fat)} → ${fr(ultimoFechado.fat)}). Vale entender se ${MES_ATUAL} está revertendo essa queda ou confirmando uma tendência.`});
    }
  }

  /* ============================================================
     CAMADA 3 — POR LOJA: meta do mês, TM, e padrão de risco
  ============================================================ */
  // Ordenar lojas por % de projeção (das piores para as melhores) para priorizar atenção
  const lojasOrdenadas = [...NOMES].sort((a,b)=>pct(LOJAS[a].fat_total,LOJAS[a].meta)-pct(LOJAS[b].fat_total,LOJAS[b].meta));

  lojasOrdenadas.forEach(n=>{
    const l=LOJAS[n];
    const pctProj = pct(l.fat_total,l.meta);
    const faltaReal = Math.max(0,l.meta-l.fat_real);

    if(pctProj < 70){
      alertasLojas.push({tipo:'re', msg:`<strong>${n}</strong> é a maior preocupação agora: projeção de apenas ${pctProj}% da meta (${fr(l.fat_total)} de ${fr(l.meta)}). Faltam ${fr(faltaReal)} no real acumulado — vale entender se é problema de fluxo de clientes, equipe, ou alguma campanha que não engatou.`});
    } else if(pctProj < 90){
      alertasLojas.push({tipo:'ye', msg:`<strong>${n}</strong> projeta ${pctProj}% da meta. Recuperável nas semanas restantes, mas precisa de empurrão — não vai se resolver só com o ritmo atual.`});
    } else if(pctProj < 100){
      alertasLojas.push({tipo:'ye', msg:`<strong>${n}</strong> está quase lá: projeção de ${pctProj}% da meta (faltam só ${fr(l.meta-l.fat_total)}). Um pequeno esforço extra nas semanas restantes garante a meta.`});
    } else {
      alertasLojas.push({tipo:'gr', msg:`<strong>${n}</strong> está tranquila: projeção de ${pctProj}% da meta (${fr(l.fat_total)}). ${pctProj>=115?'Vale entender o que está funcionando aqui para replicar nas demais lojas.':''}`});
    }

    // Produto vs Servico - identificar QUAL dos dois está puxando a loja pra baixo
    const pctProd = pct(l.prodRealAcum, l.prodMetaMes);
    const pctServ = pct(l.servRealAcum, l.servMetaMes);
    if(pctProj < 95 && Math.abs(pctProd-pctServ) > 25){
      const fraco = pctProd < pctServ ? 'Produto' : 'Serviço';
      const fracoVal = pctProd < pctServ ? pctProd : pctServ;
      alertasLojas.push({tipo:'ye', msg:`Em <strong>${n}</strong>, o gargalo é específico: ${fraco} está em ${fracoVal}% da meta enquanto o outro lado está bem melhor. Cobrar a equipe focado nesse ponto específico, não no faturamento total.`});
    }

    // TM em queda ao longo das semanas reais (sinal de perda de força de venda, nao so de volume)
    if(l.tm.length >= 2){
      const tmPrimeira = l.tm[0];
      const tmUltima = l.tm[l.tm.length-1];
      if(tmUltima < tmPrimeira * 0.85){
        alertasLojas.push({tipo:'ye', msg:`Ticket médio de <strong>${n}</strong> caiu de R$ ${tmPrimeira.toFixed(0)} (S1) para R$ ${tmUltima.toFixed(0)} (última semana). Pode ser sazonalidade, mas vale checar se a equipe está empurrando produtos de menor valor.`});
      } else if(tmUltima > tmPrimeira * 1.20){
        alertasLojas.push({tipo:'gr', msg:`Ticket médio de <strong>${n}</strong> subiu de R$ ${tmPrimeira.toFixed(0)} para R$ ${tmUltima.toFixed(0)} ao longo do mês — sinal de que a equipe está vendendo melhor, não só mais.`});
      }
    }
  });

  // Destaque comparativo entre a melhor e a pior loja do mes - util para reuniao de equipe
  const melhorLoja = lojasOrdenadas[lojasOrdenadas.length-1];
  const piorLoja = lojasOrdenadas[0];
  const gapPct = pct(LOJAS[melhorLoja].fat_total,LOJAS[melhorLoja].meta) - pct(LOJAS[piorLoja].fat_total,LOJAS[piorLoja].meta);
  if(gapPct > 40){
    alertasLojas.push({tipo:'ye', msg:`Gap grande entre lojas este mês: <strong>${melhorLoja}</strong> (${pct(LOJAS[melhorLoja].fat_total,LOJAS[melhorLoja].meta)}%) vs <strong>${piorLoja}</strong> (${pct(LOJAS[piorLoja].fat_total,LOJAS[piorLoja].meta)}%). Vale entender o que ${melhorLoja} está fazendo diferente.`});
  }

  return`<div class="box"><div class="bt">📊 Diagnóstico Anual — ${MES_ATUAL}, Semana ${SEM_ATUAL}</div>
    ${alertasAnual.map(a=>`<div class="ins ${a.tipo}">${a.msg}</div>`).join('')}
  </div>

  <div class="box"><div class="bt">📅 Diagnóstico Mensal — ${MES_ATUAL}</div>
    ${alertasMensal.map(a=>`<div class="ins ${a.tipo}">${a.msg}</div>`).join('')}
  </div>

  <div class="box"><div class="bt">🏪 Diagnóstico por Loja — Semana ${SEM_ATUAL}</div>
    ${alertasLojas.map(a=>`<div class="ins ${a.tipo}">${a.msg}</div>`).join('')}
  </div>

  <div class="box"><div class="bt">O que precisa acontecer nas semanas restantes</div>
  <table><thead><tr><th>Loja</th><th>Real Acumulado</th><th>Meta</th><th>Falta para meta</th><th>Já faturou assim antes?</th></tr></thead>
  <tbody>${NOMES.map(n=>{
    const l=LOJAS[n];
    const falta=Math.max(0,l.meta-l.fat_real);
    const hist_med = (l.hist_s3.reduce((a,b)=>a+b,0)+l.hist_s4.reduce((a,b)=>a+b,0))/(l.hist_s3.length+l.hist_s4.length)*2;
    const viavel = falta<=hist_med*1.2;
    const folgaPct = falta>0 ? Math.round((falta/hist_med)*100) : 0;
    return`<tr>
      <td><strong>${n}</strong></td>
      <td>${fr(l.fat_real)}</td>
      <td class="d">${fr(l.meta)}</td>
      <td class="${falta===0?'g':'y'}">${fr(falta)}</td>
      <td>${falta===0
        ? '<span class="bdg bg">✓ Meta já batida</span>'
        : (viavel
            ? `<span class="bdg bg">✓ Sim</span> <span style="font-size:9px;color:#666">(precisa de ${folgaPct}% da média histórica dessas semanas)</span>`
            : `<span class="bdg br2">⚠ Seria recorde</span> <span style="font-size:9px;color:#666">(precisaria de ${folgaPct}% da média histórica — bem acima do normal)</span>`)}
      </td>
    </tr>`;}).join('')}</tbody></table>
  <div style="font-size:10px;color:#444;margin-top:6px">Compara o quanto falta para a meta com o que essa loja já faturou, em média, nas mesmas semanas dos últimos 5 meses. "Seria recorde" não significa impossível — significa que exigiria um resultado melhor do que o histórico recente.</div>
  </div>`;
}
};

/* =========== DADOS ANUAIS =========== */
const META_ANO = 3000000;

V.anual = function(){
  const fat_jan_mai = REAL_MESES.slice(0,5).reduce((a,d)=>a+d.fat,0);
  const fat_acum_real = fat_jan_mai + GERAL.fat_real;
  const fat_jun_proj  = JUNHO_PROJ_TOTAL;
  const fat_1sem      = fat_jan_mai + fat_jun_proj;
  const ritmo_mensal  = fat_jan_mai / 5;

  const tot2r = PROJ_2SEM.reduce((a,d)=>a+d.r,0);
  const tot2o = PROJ_2SEM.reduce((a,d)=>a+d.o,0);
  const anoR  = fat_1sem + tot2r;
  const anoO  = fat_1sem + tot2o;

  function barAno(real, proj, meta, corProj){
    const maxV = Math.max(real+proj, meta)*1.02;
    const pr = Math.min(real/maxV*100,100);
    const pp = Math.min(proj/maxV*100, 100-pr);
    const pm = Math.min(meta/maxV*100,100);
    const total = real+proj;
    const cTotal = cor(total,meta);

    // Checkpoint: onde deveria estar HOJE se o ritmo fosse linear até a meta
    const hoje = new Date();
    const inicioAno = new Date(hoje.getFullYear(), 0, 1);
    const fimAno    = new Date(hoje.getFullYear(), 11, 31);
    const diaDoAno  = Math.floor((hoje - inicioAno) / 86400000);
    const totalDias = Math.floor((fimAno - inicioAno) / 86400000);
    const fracaoAno = diaDoAno / totalDias;
    const metaEsperadaHoje = meta * fracaoAno;
    const pCheckpoint = Math.min(metaEsperadaHoje/maxV*100, 100);
    const noRitmo = real >= metaEsperadaHoje;

    return`<div class="prog-wrap" style="height:32px;margin-bottom:6px;margin-top:18px;overflow:visible">
      <div class="prog-real" style="width:${pr}%;font-size:12px;${estiloGradienteBarra(real,meta)}">${real>0?fr(real):''}</div>
      <div class="prog-proj" style="left:${pr}%;width:${pp}%;background:repeating-linear-gradient(45deg,${corProj}aa,${corProj}aa 4px,${corProj}44 4px,${corProj}44 8px)">${proj>0?'+'+fr(proj):''}</div>
      <div class="prog-meta" style="left:${pm}%"></div>
      <div style="position:absolute;top:-4px;left:${pCheckpoint}%;width:2px;height:40px;background:${noRitmo?'#5dca6a':'#fff'};box-shadow:0 0 3px rgba(255,255,255,.6)" title="Ritmo esperado para ${MES_ATUAL}"></div>
      <div style="position:absolute;top:-16px;left:${pCheckpoint}%;transform:translateX(-50%);font-size:9px;color:${noRitmo?'#5dca6a':'#ddd'};white-space:nowrap">↓ ${MES_ATUAL.substring(0,3)}</div>
      <div class="prog-lbl" style="font-size:11px;color:${cTotal}">${pct(total,meta)}% → ${fr(total)}</div>
    </div>`;
  }

  return`
  <div class="cards">
    <div class="card"><div class="lb">Acumulado Real (Jan–Jun S2)</div><div class="vl" style="color:#f39c12">${fr(fat_acum_real)}</div><div class="sb">${pct(fat_acum_real,META_ANO)}% da meta anual</div></div>
    <div class="card"><div class="lb">1º Semestre (c/ Jun proj.)</div><div class="vl" style="color:#eee">${fr(fat_1sem)}</div><div class="sb">Junho projetado: ${fr(fat_jun_proj)}</div></div>
    <div class="card"><div class="lb">Meta Anual</div><div class="vl" style="color:#cc0000">${fr(META_ANO)}</div><div class="sb">falta ${fr(META_ANO-fat_acum_real)} realizar</div></div>
    <div class="card"><div class="lb">Ritmo Mensal Atual</div><div class="vl" style="color:#eee">${fr(ritmo_mensal)}</div><div class="sb">média Jan–Mai fechados</div></div>
    <div class="card"><div class="lb">🟡 Fechamento Realista</div><div class="vl" style="color:#f39c12">${fr(anoR)}</div><div class="sb">${pct(anoR,META_ANO)}% da meta R$ 3M</div></div>
    <div class="card"><div class="lb">🟢 Fechamento Otimista</div><div class="vl" style="color:#2ecc71">${fr(anoO)}</div><div class="sb">${pct(anoO,META_ANO)}% da meta R$ 3M</div></div>
  </div>

  <div class="box"><div class="bt">Progresso Anual — Real + Projeção vs Meta R$ 3M</div>
    <div style="font-size:11px;color:#f39c12;margin-bottom:6px;font-weight:bold">🟡 Realista — ${fr(anoR)} (${pct(anoR,META_ANO)}%)</div>
    ${barAno(fat_acum_real, anoR-fat_acum_real, META_ANO,'#cc8800')}
    <div style="font-size:11px;color:#2ecc71;margin-bottom:6px;font-weight:bold;margin-top:14px">🟢 Otimista — ${fr(anoO)} (${pct(anoO,META_ANO)}%)</div>
    ${barAno(fat_acum_real, anoO-fat_acum_real, META_ANO,'#1a7a3a')}
    <div style="font-size:10px;color:#444;margin-top:8px">
      <span style="color:#cc0000">■</span> Real acumulado (${fr(fat_acum_real)}) &nbsp;
      <span style="color:#888">▤</span> Projeção restante &nbsp;
      <span style="color:#777">│</span> Meta R$ 3M
    </div>
  </div>

  <div class="box"><div class="bt">Projeção Mês a Mês — Cenário Otimista 2026</div>
  <table><thead><tr><th>Mês</th><th>Faturamento</th><th>Meta Mês</th><th>% Meta</th><th>Acumulado Ano</th><th>% Meta R$ 3M</th><th>Status</th></tr></thead>
  <tbody>
    ${REAL_MESES.map((d,i)=>{
      const fatMes = d.fechado ? d.fat : fat_jun_proj;
      const acum   = REAL_MESES.slice(0,i).reduce((a,x)=>a+(x.fechado?x.fat:fat_jun_proj),0) + fatMes;
      const cMes   = d.fechado ? cor(d.fat,d.meta) : cor(fat_jun_proj,d.meta);
      const isProj = !d.fechado;
      return`<tr style="${isProj?'background:#1a1200':''}">
        <td><strong>${d.m}</strong>${isProj?' <span style="font-size:9px;color:#f39c12">(proj.)</span>':''}</td>
        <td style="color:${cMes};font-weight:bold">${fr(fatMes)}</td>
        <td class="d">${fr(d.meta)}</td>
        <td style="color:${cMes};font-weight:bold">${pct(fatMes,d.meta)}%</td>
        <td style="font-weight:bold">${fr(acum)}</td>
        <td style="color:${acum/META_ANO>.66?'#2ecc71':acum/META_ANO>.33?'#f39c12':'#e74c3c'}">${pct(acum,META_ANO)}%</td>
        <td>${d.fechado?bdg(d.fat,d.meta):'<span class="bdg by">⚡ Jun proj.</span>'}</td>
      </tr>`;
    }).join('')}
    ${PROJ_2SEM.map((d,i)=>{
      const acum_ate = fat_1sem + PROJ_2SEM.slice(0,i+1).reduce((a,x)=>a+x.o,0);
      const cMes = cor(d.o,d.meta);
      return`<tr style="background:#001a08">
        <td><strong>${d.m}</strong> <span style="font-size:9px;color:#2ecc71">🟢 otimista</span></td>
        <td style="color:#2ecc71;font-weight:bold">${fr(d.o)}</td>
        <td class="d">${fr(d.meta)}</td>
        <td style="color:${cMes};font-weight:bold">${pct(d.o,d.meta)}%</td>
        <td style="color:#2ecc71;font-weight:bold">${fr(acum_ate)}</td>
        <td style="color:${cor(acum_ate,META_ANO)};font-weight:bold">${pct(acum_ate,META_ANO)}%</td>
        <td><span class="bdg bg">🟢 Proj.</span></td>
      </tr>`;
    }).join('')}
  </tbody>
  <tfoot>
    <tr style="background:#001a08;font-weight:bold;border-top:1px solid #1a6e3a">
      <td>TOTAL ANO 🟢</td>
      <td colspan="3" style="color:#555;font-size:11px">Cenário Otimista</td>
      <td style="color:#2ecc71;font-size:16px">${fr(anoO)}</td>
      <td style="color:#2ecc71;font-size:16px">${pct(anoO,META_ANO)}%</td>
      <td>${bdg(anoO,META_ANO)}</td>
    </tr>
  </tfoot>
  </table></div>

  <div class="box"><div class="bt">Comparativo dos 2 Cenários — Fechamento Anual</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div style="border:1px solid #8a6000;border-radius:7px;padding:14px">
      <div style="color:#f39c12;font-weight:bold;font-size:13px;margin-bottom:6px">🟡 Realista</div>
      <div style="font-size:26px;font-weight:bold;color:#f39c12;margin-bottom:4px">${fr(anoR)}</div>
      <div style="font-size:12px;color:#888;margin-bottom:10px">${pct(anoR,META_ANO)}% da meta · ${anoR>=META_ANO?'<span style="color:#2ecc71">META BATIDA 🎯</span>':'falta <b>'+fr(META_ANO-anoR)+'</b>'}</div>
      <div style="font-size:11px;color:#555;line-height:1.9;border-top:1px solid #333;padding-top:8px">
        TM crescendo R$ 5/mês<br>
        Orçamentos +3%/mês<br>
        Serviços em R$ 52–58k<br>
        2º semestre: ${fr(tot2r)}
      </div>
    </div>
    <div style="border:1px solid #1a6e3a;border-radius:7px;padding:14px">
      <div style="color:#2ecc71;font-weight:bold;font-size:13px;margin-bottom:6px">🟢 Otimista</div>
      <div style="font-size:26px;font-weight:bold;color:#2ecc71;margin-bottom:4px">${fr(anoO)}</div>
      <div style="font-size:12px;color:#888;margin-bottom:10px">${pct(anoO,META_ANO)}% da meta · supera em <b style="color:#2ecc71">${fr(anoO-META_ANO)}</b></div>
      <div style="font-size:11px;color:#555;line-height:1.9;border-top:1px solid #333;padding-top:8px">
        TM crescendo R$ 8/mês<br>
        Orçamentos +5%/mês<br>
        Serviços voltando a R$ 60k+<br>
        2º semestre: ${fr(tot2o)}
      </div>
    </div>
  </div></div>`;

function normTxt(s){
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .trim();
}

let assistModeloQ = '', assistServicoQ = '';

V.assistencia = function(){
  const modeloQ = normTxt(assistModeloQ);
  const servicoQ = normTxt(assistServicoQ);
  const temBusca = modeloQ.length > 0 || servicoQ.length > 0;

  let resultados = temBusca ? ASSIST_DATA : [];
  if(modeloQ){
    resultados = resultados.filter(function(d){ return normTxt(d.Modelo).indexOf(modeloQ) >= 0; });
  }
  if(servicoQ){
    resultados = resultados.filter(function(d){ return normTxt(d.Problema).indexOf(servicoQ) >= 0; });
  }

  // Agrupar por modelo
  const grupos = {};
  resultados.forEach(function(d){
    if(!grupos[d.Modelo]) grupos[d.Modelo] = [];
    grupos[d.Modelo].push(d);
  });
  const modelosOrdenados = Object.keys(grupos).sort();

  let cardsHTML = '';
  if(!temBusca){
    cardsHTML = '<div style="text-align:center;color:#555;padding:50px 20px;font-size:13px">🔍 Digite um modelo ou tipo de servi\u00e7o acima para ver os pre\u00e7os.</div>';
  } else if(modelosOrdenados.length === 0){
    cardsHTML = '<div style="text-align:center;color:#666;padding:40px 20px;font-size:13px">Nenhum resultado encontrado. Tente outro termo de busca.</div>';
  } else {
    modelosOrdenados.forEach(function(modelo){
      const itens = grupos[modelo];
      let rows = '';
      itens.forEach(function(it){
        rows += '<div style="display:flex;justify-content:space-between;padding:7px 14px;border-bottom:1px solid #1a1a1a;font-size:12px">'
          + '<span style="color:#ccc">'+it.Problema+'</span>'
          + '<span style="color:#2ecc71;font-weight:bold">R$ '+it.Valor.toFixed(2).replace('.',',')+'</span>'
          + '</div>';
      });
      cardsHTML += '<div style="background:#141414;border:1px solid #222;border-radius:7px;margin-bottom:10px;overflow:hidden">'
        + '<div style="background:#1a0000;border-bottom:1px solid #cc0000;padding:8px 14px;font-weight:bold;color:#fff;font-size:13px;letter-spacing:.5px">'+modelo.toUpperCase()+'</div>'
        + rows
        + '</div>';
    });
  }

  const totalResultados = resultados.length;

  return '<div class="box">'
    + '<div class="bt">Consulta de Preços — Assistência Técnica</div>'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">'
    + '<div style="flex:1;min-width:160px">'
    + '<label style="font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:4px">Modelo do aparelho</label>'
    + '<input type="text" id="assistModeloInput" placeholder="Ex: iPhone 11, A02s..." value="'+assistModeloQ.replace(/"/g,'&quot;')+'" '
    + 'oninput="assistBuscarModelo(this.value)" '
    + 'style="width:100%;padding:9px 12px;background:#1a1a1a;border:1px solid #333;border-radius:5px;color:#eee;font-size:13px">'
    + '</div>'
    + '<div style="flex:1;min-width:160px">'
    + '<label style="font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.7px;display:block;margin-bottom:4px">Tipo de serviço</label>'
    + '<input type="text" id="assistServicoInput" placeholder="Ex: tela, bateria, combo..." value="'+assistServicoQ.replace(/"/g,'&quot;')+'" '
    + 'oninput="assistBuscarServico(this.value)" '
    + 'style="width:100%;padding:9px 12px;background:#1a1a1a;border:1px solid #333;border-radius:5px;color:#eee;font-size:13px">'
    + '</div>'
    + '<div style="display:flex;align-items:flex-end">'
    + '<button onclick="assistLimpar()" style="padding:9px 16px;background:#222;border:1px solid #333;border-radius:5px;color:#aaa;font-size:12px;cursor:pointer;white-space:nowrap">Limpar</button>'
    + '</div>'
    + '</div>'
    + '<div style="font-size:11px;color:#555;margin-bottom:12px">'+(temBusca ? (totalResultados+' resultado(s) encontrado(s) em '+modelosOrdenados.length+' modelo(s)') : '&nbsp;')+'</div>'
    + '<div style="max-height:600px;overflow-y:auto">'+cardsHTML+'</div>'
    + '</div>';
};

function assistBuscarModelo(v){
  assistModeloQ = v;
  const el = document.getElementById('content');
  const scrollPos = el.scrollTop;
  el.innerHTML = V.assistencia();
  document.getElementById('assistModeloInput').focus();
  document.getElementById('assistModeloInput').setSelectionRange(v.length,v.length);
}

/* =========== CONTROLES =========== */
const TABS=['assistencia','anual','mes','loja','alertas'];
const LBLS=['🔧 Assistência','📊 Resultado Anual','📅 Mês Atual','🏪 Por Loja','🚨 Alertas'];

function selLoja(n){curLoja=n;document.getElementById('content').innerHTML=V.loja();}

function render(){
  const badgeEl = document.getElementById('semana-badge-txt');
  if(badgeEl) badgeEl.innerHTML = '📅 '+MES_ATUAL.toUpperCase()+' 2026 — SEMANA '+SEM_ATUAL+' DE 4';

  const header = document.getElementById('app-header');
  if(curTab === 'home'){
    header.style.display = 'none';
    document.getElementById('content').innerHTML = V.home();
  } else {
    header.style.display = 'block';
    document.getElementById('tabs').innerHTML =
      '<div class="tab" onclick="goTab(&#39;home&#39;)" style="background:#1a1a1a;border-color:#333">🏠</div>'
      + TABS.map((t,i)=>`<div class="tab${t===curTab?' on':''}" onclick="goTab('${t}')">${LBLS[i]}</div>`).join('');
    document.getElementById('content').innerHTML = V[curTab]();
  }
}
function goTab(t){curTab=t;render();}
curTab = 'home';
render();
</script>
