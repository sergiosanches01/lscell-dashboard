<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#eee;font-family:Arial,sans-serif;font-size:13px;padding:16px}
h1{color:#cc0000;text-align:center;font-size:18px;letter-spacing:2px;margin-bottom:2px}
.sub{text-align:center;color:#555;font-size:11px;margin-bottom:4px}
.semana-badge{text-align:center;margin-bottom:14px}
.sbadge{display:inline-block;background:#1a0000;border:1px solid #cc0000;color:#cc0000;padding:4px 16px;border-radius:99px;font-size:12px;font-weight:bold;letter-spacing:1px}
#tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 13px;border-radius:4px;border:1px solid #2a2a2a;background:#141414;cursor:pointer;color:#777;font-size:12px;transition:.15s}
.main-nav{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.main-btn{padding:10px 22px;border-radius:8px;border:1px solid #333;background:#1a1a1a;cursor:pointer;color:#999;font-size:13px;font-weight:bold;transition:.15s;letter-spacing:.3px;white-space:nowrap}
.main-btn.on{background:#cc0000;border-color:#cc0000;color:#fff;box-shadow:0 2px 8px rgba(204,0,0,.35)}
.main-btn:hover:not(.on){border-color:#cc0000;color:#cc0000}
.home-btn-mini{padding:9px 12px;border-radius:8px;border:1px solid #333;background:#1a1a1a;cursor:pointer;color:#999;font-size:14px;transition:.15s;flex-shrink:0}
.home-btn-mini:hover{border-color:#cc0000;color:#cc0000}
@media (max-width:430px){
  .main-nav{gap:6px;padding:0 2px}
  .main-btn{padding:9px 10px;font-size:11px;letter-spacing:0;flex:1;text-align:center;white-space:normal;line-height:1.2}
  .home-btn-mini{padding:9px 10px;font-size:13px}
}
.tab.on{background:#cc0000;border-color:#cc0000;color:#fff;font-weight:bold}
.tab:hover:not(.on){border-color:#cc0000;color:#cc0000}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.card{background:#141414;border:1px solid #222;border-radius:7px;padding:12px 14px}
.lb{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.8px}
.vl{font-size:19px;font-weight:bold;margin:3px 0 1px}
.sb{font-size:11px;color:#555}
.box{background:#141414;border:1px solid #1e1e1e;border-radius:7px;padding:14px;margin-bottom:12px}
.bt{font-size:11px;color:#cc0000;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:bold}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
th{background:#111;color:#cc0000;padding:7px 8px;text-align:left;border-bottom:1px solid #222;font-size:10px;text-transform:uppercase;letter-spacing:.6px}
td{padding:6px 8px;border-bottom:1px solid #181818}
tr:hover td{background:#161616}
.g{color:#2ecc71;font-weight:bold}.r{color:#e74c3c;font-weight:bold}.y{color:#f39c12;font-weight:bold}.d{color:#444}
.bdg{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:bold;display:inline-block}
.bg{background:#1a3a25;color:#2ecc71}.br2{background:#3a1515;color:#e74c3c}.by{background:#3a2a08;color:#f39c12}.bp{background:#1a1a3a;color:#7799ff}
.ins{background:#141414;border-left:3px solid #cc0000;padding:8px 12px;border-radius:0 5px 5px 0;margin-bottom:8px;font-size:12px;line-height:1.6;color:#bbb}
.ins.gr{border-left-color:#2ecc71}.ins.ye{border-left-color:#f39c12}.ins.re{border-left-color:#e74c3c}
.ins strong{color:#eee}
.loja-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.lbtn{padding:6px 14px;border-radius:4px;border:1px solid #333;background:#111;cursor:pointer;color:#888;font-size:11px;transition:.15s}
.lbtn.on{border-color:#cc0000;background:#1a0000;color:#cc0000;font-weight:bold}
.lbtn:hover:not(.on){border-color:#cc0000;color:#cc0000}
.prog-wrap{background:#1a1a1a;border-radius:3px;height:26px;position:relative;overflow:hidden;margin-bottom:6px}
.prog-real{position:absolute;left:0;top:0;height:100%;background:#e74c3c;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden}
.prog-proj{position:absolute;top:0;height:100%;background:repeating-linear-gradient(45deg,#7a5500,#7a5500 4px,#5a3a00 4px,#5a3a00 8px);display:flex;align-items:center;padding-left:6px;font-size:10px;color:#f39c12;white-space:nowrap;overflow:hidden}
.prog-meta{position:absolute;top:0;height:100%;width:2px;background:rgba(255,255,255,.4)}
.prog-lbl{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:#aaa;pointer-events:none}
.alerta{background:#1a0800;border:1px solid #cc4400;border-radius:6px;padding:10px 14px;margin-bottom:8px;font-size:12px;line-height:1.6}
.alerta.ok{background:#001a08;border-color:#007733}
.alerta.warn{background:#1a1000;border-color:#cc8800}
.semrow{display:flex;gap:6px;margin-bottom:8px}
.semcell{flex:1;border-radius:5px;padding:8px;text-align:center;font-size:11px}
.semcell.real{background:#1a1a1a;border:1px solid #333}
.semcell.proj{background:#1a1000;border:1px solid #5a3a00}
.semcell.future{background:#0d0d0d;border:1px dashed #2a2a2a}
.semcell .slbl{font-size:9px;color:#555;text-transform:uppercase;margin-bottom:4px}
.semcell .sval{font-size:14px;font-weight:bold}
.semcell .spct{font-size:10px;margin-top:2px}
</style>
</head>

/* =========== HELPERS =========== */
function f(v){return Math.round(v).toLocaleString('pt-BR');}
function fr(v){return 'R '+f(v);}
function pct(r,m){return Math.round(r/m*100);}
function cor(r,m){
  var p = r/m;
  if(p >= 1.00) return '#2ecc71';   // 100%+ verde total
  if(p >= 0.95) return '#5dca6a';   // 95-99% verde claro
  if(p >= 0.88) return '#a8c835';   // 88-94% verde amarelado
  if(p >= 0.80) return '#f0c020';   // 80-87% amarelo
  if(p >= 0.70) return '#f39c12';   // 70-79% laranja
  return '#e74c3c';                  // abaixo 70% vermelho
}
// Gera o estilo CSS (background + background-size) para a barra preenchida ter um gradiente
// vermelho->verde que se "revela" conforme o progresso real em relação a META (nao a largura visual).
// Em baixo % da meta, mostra so o trecho vermelho do gradiente; conforme se aproxima de 100%,
// vai revelando mais do gradiente até o verde. Em 100%+, fica verde solido.
function estiloGradienteBarra(r, m){
  var pctMeta = Math.max(1, Math.min(r/m*100, 100)); // % da meta, entre 1 e 100
  if(r/m >= 1.00){
    return 'background:#2ecc71';
  }
  var escala = 10000 / pctMeta; // quanto menor o %, mais "esticado" o gradiente, revelando so o inicio
  return 'background:linear-gradient(90deg,#e74c3c 0%,#f39c12 55%,#f0c020 75%,#a8c835 87%,#5dca6a 95%,#2ecc71 100%);'
       + 'background-size:'+escala+'% 100%;background-position:left center';
}
// Borda do card/box: fica verde quando a meta foi batida, neutra caso contrario
function bordaMeta(r,m){
  return (r>=m) ? '#1a6e3a' : '#1e1e1e';
}
function bdg(r,m){
  if(r>=m)return '<span class="bdg bg">✓ META</span>';
  if(r/m>.85)return '<span class="bdg by">⚠ PERTO</span>';
  return '<span class="bdg br2">✗ ABAIXO</span>';
}
function bdgProj(r,m){
  if(r>=m)return '<span class="bdg bg">✓ Proj. META</span>';
  if(r/m>.85)return '<span class="bdg by">⚠ Proj. perto</span>';
  return '<span class="bdg br2">✗ Proj. abaixo</span>';
}
function semBar(fat_real, fat_proj, meta){
  // maxV agora cresce dinamicamente com o real, permitindo a barra continuar somando alem da meta
  var maxV = Math.max(fat_real+fat_proj, meta)*1.05;
  var pr = Math.min(fat_real/maxV*100,100);
  var pp = Math.min(fat_proj/maxV*100, 100-pr);
  var pm = Math.min(meta/maxV*100,100);
  var total = fat_real+fat_proj;
  var estiloBar = estiloGradienteBarra(fat_real, meta);
  var cTotal = cor(total, meta);

  // Marcacoes de checkpoint: acumulado esperado ao fim de S1, S2 e S3 (1/4, 2/4, 3/4 da meta)
  var marcas = '';
  [1,2,3].forEach(function(s){
    var metaAcumS = meta * (s/4);
    var pS = Math.min(metaAcumS/maxV*100,100);
    var atingiu = fat_real >= metaAcumS;
    marcas += '<div style="position:absolute;top:-3px;left:'+pS+'%;width:1px;height:28px;background:'+(atingiu?'#5dca6a':'rgba(255,255,255,.45)')+'"></div>'
            + '<div style="position:absolute;top:-13px;left:'+pS+'%;transform:translateX(-50%);font-size:8px;color:'+(atingiu?'#5dca6a':'#999')+'">S'+s+'</div>';
  });

  return '<div class="prog-wrap" style="overflow:visible;margin-top:14px">'
    +'<div class="prog-real" style="width:'+pr+'%;'+estiloBar+'">'+(fat_real>0?fr(fat_real):'')+'</div>'
    +'<div class="prog-proj" style="left:'+pr+'%;width:'+pp+'%">'+(fat_proj>0?'+'+fr(fat_proj)+' proj.':'')+'</div>'
    +'<div class="prog-meta" style="left:'+pm+'%"></div>'
    + marcas
    +'<div class="prog-lbl" style="color:'+cTotal+'">'+pct(total,meta)+'% → '+fr(total)+'</div>'
    +'</div>';
}
function barSimples(lbl, real, meta, maxV, proj, note){
  if(real===undefined||real===null)return '';
  var pr=Math.min(real/maxV*100,100);
  var pp=proj?Math.min(proj/maxV*100,100-pr):0;
  var pm=Math.min(meta/maxV*100,100);
  var total=real+(proj||0);
  // Verde escuro quando a projecao total supera a meta - destaque extra de "vai bater"
  var corBar = (total > meta) ? '#1a8a4a' : cor(total,meta);
  var textoLabel = note || (pct(total,meta)+'% → '+fr(total));

    +(proj?'<div style="position:absolute;left:'+pr+'%;top:0;height:100%;width:'+pp+'%;background:repeating-linear-gradient(45deg,#7a5500,#7a5500 3px,#5a3a00 3px,#5a3a00 6px)"></div>':'')
    +'<div style="position:absolute;top:0;left:'+pm+'%;height:100%;width:2px;background:rgba(255,255,255,.6);box-shadow:0 0 2px rgba(255,255,255,.4)"></div>'
    +'<div style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:10px;color:#ddd;font-weight:bold;text-shadow:0 1px 2px #000">'+textoLabel+'</div>'
    +'</div></div>';
}

function miniBarProdServ(lbl, real, meta){

// Calcula quantos dias uteis (seg-sab, sem domingo) restam de HOJE até o fim do mes corrente
function diasUteisRestantesNoMes(){
  var hoje = new Date();
  var ano = hoje.getFullYear();
  var mesIdx = hoje.getMonth(); // 0-11
  var ultimoDia = new Date(ano, mesIdx+1, 0).getDate();
  var dias = 0;
  for(var d = hoje.getDate(); d <= ultimoDia; d++){
    var diaSemana = new Date(ano, mesIdx, d).getDay(); // 0=domingo
    if(diaSemana !== 0) dias++;
  }
  return Math.max(1, dias);
}

      + '<div style="font-size:9px;color:#555;margin-top:2px">meta orig.: ' + fr(l.s_meta[i]) + '</div>'
      + '</div>'
      + blocoReal(v, l.s_meta[i])
      + '</div>';
  });

  // Semanas projetadas — apenas as que ainda NAO sao reais (posicao >= SEM_ATUAL)
  var projsTodos = [l.proj_s3, l.proj_s4];
  projsTodos.forEach(function(v,i){
    var idxSemana = i+2; // 2 = S3, 3 = S4
    if(idxSemana < SEM_ATUAL) return; // essa semana ja e real, ja foi mostrada acima
    var metaO = l.s_meta[idxSemana];
    var cP = '#f39c12';
    html += '<div style="flex:1;min-width:130px">'
      + '<div class="semcell proj" style="margin-bottom:6px">'
      + '<div class="slbl">S' + (idxSemana+1) + ' projetado</div>'
      + '<div class="sval" style="color:' + cP + '">' + fr(v) + '</div>'
      + '<div class="spct" style="color:' + cP + '">' + pct(v,metaO) + '% meta</div>'
      + '<div style="font-size:9px;color:#555;margin-top:2px">meta orig.: ' + fr(metaO) + '</div>'
      + '</div>'
      + blocoFutura(metaO, ajuste, idxSemana)
      + '</div>';
  });

  html += '</div>';
  return html;
}

// Monta a serie Jan-Dez (12 valores) de faturamento para uma loja, combinando real + projecao.
// meses fechados (Jan-Mai) = hist S1+S2 (hist_acum_s1s2) + hist_s3 + hist_s4 daquela loja.
// mes atual = fat_real (real) + fat_proj (projetado).
// Jul-Dez = projecao estimada proporcional a participacao historica da loja no total geral.
const HIST_ACUM_S1S2_GLOBAL = {
  'Esteio':       [7746+9317, 7746+8966, 13737+8967, 25276+10425, 15036+11971],
  'Esteio Shop.': [4335+4084, 4335+5119, 7189+7320,  10900+5021,  11336+6114],
  'Canoas':       [10278+8088,10278+3914, 7786+8922,  13771+6186,  18700+7921],
  'Avenida':      [4441+3186, 4201+1720,  4252+1754,  5301+3704,   11281+10245],
  'Parque':       [12552+8687,12552+8787, 10795+6226, 20080+12985, 14303+9319],
  'Gravataí':     [7180+5385, 7180+6129,  7142+8073,  18145+11657, 14204+9671],
};
function montarSerieMensalLoja(l, nomeLoja){
  const mesesFechados = HIST_ACUM_S1S2_GLOBAL[nomeLoja].map(function(s1s2,i){
    return s1s2 + l.hist_s3[i] + l.hist_s4[i];
  }); // Jan a Mai, 5 valores reais

  const mesAtualReal = l.fat_real;       // parte ja realizada do mes atual
  const mesAtualProj = l.fat_proj;       // parte ainda projetada do mes atual
  const mesAtual = mesAtualReal + mesAtualProj;

  // Participacao historica da loja no total geral (media Jan-Mai) - usada para estimar Jul-Dez
  const totalGeralMesesFechados = NOMES.reduce(function(acc,n){
    const ld = LOJAS[n];
    const serieGeral = HIST_ACUM_S1S2_GLOBAL[n].map(function(s1s2,i){ return s1s2 + ld.hist_s3[i] + ld.hist_s4[i]; });
    return acc + serieGeral.reduce(function(a,b){return a+b;},0);
  },0);
  const totalLojaMesesFechados = mesesFechados.reduce(function(a,b){return a+b;},0);
  const participacao = totalGeralMesesFechados>0 ? (totalLojaMesesFechados/totalGeralMesesFechados) : (1/NOMES.length);

  const projFuturos = PROJ_2SEM.map(function(p){ return Math.round(p.r * participacao); });

  const valores = mesesFechados.concat([mesAtual]).concat(projFuturos); // 12 valores
  const valoresReal = mesesFechados.concat([mesAtualReal]).concat(projFuturos.map(function(){return 0;}));
  const valoresProj  = mesesFechados.map(function(){return 0;}).concat([mesAtualProj]).concat(projFuturos);
  const labels = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const isProjetado = [false,false,false,false,false,(mesAtualProj>0), true,true,true,true,true,true];
  return { valores: valores, valoresReal: valoresReal, valoresProj: valoresProj, labels: labels, isProjetado: isProjetado };
}

// Monta a serie Jan-Dez do GERAL (todas as lojas somadas) - usa REAL_MESES + GERAL + PROJ_2SEM
function montarSerieMensalGeral(){
  const fechados = REAL_MESES.filter(function(m){return m.fechado;}).map(function(m){return m.fat;});
  const mesAtualParcial = REAL_MESES.find(function(m){return !m.fechado;});
  const temMesParcial = !!mesAtualParcial;
  const mesAtualReal = temMesParcial ? GERAL.fat_real : null;
  const mesAtualProj = temMesParcial ? GERAL.fat_proj : null;
  const mesAtual = temMesParcial ? (GERAL.fat_real+GERAL.fat_proj) : null;

  const valores = fechados.slice();
  const valoresReal = fechados.slice();
  const valoresProj = fechados.map(function(){return 0;});
  const indiceMesAtual = mesAtual!==null ? valores.length : -1; // posicao do mes corrente, antes de inserir

  if(mesAtual!==null){
    valores.push(mesAtual);
    valoresReal.push(mesAtualReal);
    valoresProj.push(mesAtualProj);
  }
  PROJ_2SEM.forEach(function(p){
    valores.push(p.r);
    valoresReal.push(0);
    valoresProj.push(p.r);
  });

  const labels = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const isProjetado = labels.map(function(_,i){
    if(i === indiceMesAtual) return GERAL.fat_proj > 0; // mes corrente: projetado so se ainda faltar semana
    return i > indiceMesAtual; // meses depois do atual = sempre projecao (2o semestre)
  });
  return { valores: valores, valoresReal: valoresReal, valoresProj: valoresProj, labels: labels, isProjetado: isProjetado };
}

// Desenha o grafico de barras simples Jan-Dez (real solido + projetado mais claro/listrado)
function buildGraficoAnualBarras(serie, metasLinhas){
  const ALTURA = 140; // altura da area de barras em px (sem contar labels)
  const metas = metasLinhas || []; // array de {valor, label, cor}
  const maiorMeta = metas.length ? Math.max.apply(null, metas.map(function(m){return m.valor;})) : 0;
  const max = Math.max(Math.max.apply(null, serie.valores), maiorMeta) * 1.12;

  // Definir 4 linhas de grade horizontais com valores redondos, cobrindo todo o "max"
  const NUM_LINHAS = 4;
  const passoBruto = max / NUM_LINHAS;
  const ordem = Math.pow(10, Math.floor(Math.log10(passoBruto||1)));
  const passo = Math.ceil(passoBruto/ordem)*ordem;
  const maxGrade = passo*NUM_LINHAS;

  function yPx(valor){ return (valor/maxGrade)*ALTURA; }

  const linhasGrade = [];
  for(var g=0; g<=NUM_LINHAS; g++){
    linhasGrade.push({valor: passo*g, posY: yPx(passo*g)});
  }

  const gradeHtml = linhasGrade.map(function(gl){
    const valK = gl.valor>=1000 ? (gl.valor/1000).toFixed(0)+'k' : gl.valor.toFixed(0);
    return '<div style="position:absolute;left:0;right:0;bottom:'+gl.posY+'px;border-top:1px solid #2a2a2a;pointer-events:none"></div>'
      + '<div style="position:absolute;left:0;bottom:'+gl.posY+'px;transform:translateY(50%);font-size:8px;color:#555;background:#141414;padding-right:3px">'+valK+'</div>';
  }).join('');

  // Linhas de meta (tracejadas, por cima da grade) - ex: meta oficial 210k, meta maxima 250k
  const metasHtml = metas.map(function(m){
    const posY = yPx(m.valor);
    const valK = m.valor>=1000 ? (m.valor/1000).toFixed(0)+'k' : m.valor.toFixed(0);
    return '<div style="position:absolute;left:0;right:0;bottom:'+posY+'px;border-top:2px dashed '+m.cor+';pointer-events:none"></div>'
      + '<div style="position:absolute;left:0;bottom:'+posY+'px;transform:translateY(-40%);font-size:8px;color:'+m.cor+';background:#141414;padding:0 3px;font-weight:bold">'+(m.label||'')+' '+valK+'</div>';
  }).join('');

  const barras = serie.valores.map(function(v,i){
    const vReal = serie.valoresReal ? serie.valoresReal[i] : (serie.isProjetado[i]?0:v);
    const vProj = serie.valoresProj ? serie.valoresProj[i] : (serie.isProjetado[i]?v:0);
    const alturaReal = Math.max(0, yPx(vReal));
    const alturaProj = Math.max(0, yPx(vProj));
    const temAmbos = vReal>0 && vProj>0;
    const valK = v>=1000 ? (v/1000).toFixed(0)+'k' : v.toFixed(0);
    const corLabel = serie.isProjetado[i] ? '#aa6666' : '#999';

    return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;min-width:0;height:100%;position:relative;z-index:1">'
      + '<div style="font-size:8px;color:'+corLabel+';margin-bottom:3px;white-space:nowrap">'+valK+'</div>'
      + '<div style="display:flex;flex-direction:column-reverse;width:100%;max-width:34px">'
      + (vReal>0 ? '<div style="width:100%;height:'+alturaReal+'px;background:#cc0000;border-radius:'+(vProj>0?'0 0 3px 3px':'3px 3px 3px 3px')+'"></div>' : '')
      + (vProj>0 ? '<div style="width:100%;height:'+alturaProj+'px;background:repeating-linear-gradient(45deg,#7a2222,#7a2222 4px,#5a1818 4px,#5a1818 8px);'+(temAmbos?'':'border-radius:3px 3px 0 0')+'"></div>' : '')
      + '</div>'
      + '</div>';
  }).join('');

  const labelsHtml = serie.labels.map(function(lbl){
    return '<div style="flex:1;text-align:center;font-size:9px;color:#777">'+lbl+'</div>';
  }).join('');

  return '<div style="position:relative;height:'+ALTURA+'px;margin-left:24px;margin-top:8px">'
    + gradeHtml
    + metasHtml
    + '<div style="display:flex;align-items:flex-end;gap:4px;height:100%;position:relative">'+barras+'</div>'
    + '</div>'
    + '<div style="display:flex;gap:4px;margin-left:24px;margin-top:2px">'+labelsHtml+'</div>'
    + '<div style="font-size:10px;color:#444;margin-top:10px;margin-left:24px"><span style="color:#cc0000">■</span> Realizado &nbsp; <span style="color:#7a2222">▤</span> Projetado'
    + (metas.length ? ' &nbsp; ' + metas.map(function(m){return '<span style="color:'+m.cor+'">┄</span> '+(m.label||'Meta');}).join(' &nbsp; ') : '')
    + '</div>';
}

},

alertas(){
  const alertasAnual = [];
  const alertasMensal = [];
  const alertasLojas = [];

  /* ============================================================
     CAMADA 1 — ANUAL: ritmo do ano vs meta de R$ 3M
  ============================================================ */
  const META_ANO_LOCAL = 3000000;
  const mesesFechados = REAL_MESES.filter(m=>m.fechado);
  const fatAnoFechados = mesesFechados.reduce((a,m)=>a+m.fat,0);
  const fatAnoComMesAtual = fatAnoFechados + GERAL.fat_total_proj;
  const tot2semR = PROJ_2SEM.reduce((a,m)=>a+m.r,0);
  const tot2semO = PROJ_2SEM.reduce((a,m)=>a+m.o,0);
  const anoRealista = fatAnoComMesAtual + tot2semR;
  const anoOtimista = fatAnoComMesAtual + tot2semO;
  const pctAnoReal = Math.round(fatAnoComMesAtual/META_ANO_LOCAL*100);
  const pctAnoProjR = Math.round(anoRealista/META_ANO_LOCAL*100);

  // Pior e melhor mês fechado, para dar contexto de variação
  const piorMes = mesesFechados.reduce((a,b)=>pct(a.fat,a.meta)<pct(b.fat,b.meta)?a:b);
  const melhorMes = mesesFechados.reduce((a,b)=>pct(a.fat,a.meta)>pct(b.fat,b.meta)?a:b);

  if(pctAnoProjR >= 100){
    alertasAnual.push({tipo:'gr', msg:`<strong>📊 Ritmo anual:</strong> no cenário realista o ano projeta ${fr(anoRealista)} (${pctAnoProjR}% da meta de R$ 3M). No caminho certo, mas qualquer mês fraco como ${piorMes.m} (${pct(piorMes.fat,piorMes.meta)}% da meta) compromete a margem.`});
  } else if(pctAnoProjR >= 90){
    alertasAnual.push({tipo:'ye', msg:`<strong>📊 Ritmo anual:</strong> cenário realista projeta ${fr(anoRealista)} (${pctAnoProjR}% da meta). Falta ${fr(META_ANO_LOCAL-anoRealista)} — o 2º semestre precisa repetir o nível de ${melhorMes.m} com consistência, não só em um mês isolado.`});
  } else {
    alertasAnual.push({tipo:'re', msg:`<strong>📊 Ritmo anual:</strong> cenário realista projeta apenas ${pctAnoProjR}% da meta anual (${fr(anoRealista)}). Para chegar perto de R$ 3M, o ritmo do 2º semestre precisa ficar próximo do cenário otimista (${fr(anoOtimista)}), o que exige ação deliberada — não é algo que acontece sozinho.`});
  }

  /* ============================================================
     CAMADA 2 — MENSAL: ritmo do mês atual, comparado a meses fechados
  ============================================================ */
  const pctMesProj = pct(GERAL.fat_total_proj, META_MES_GERAL);
  const semanasRestantes = 4 - SEM_ATUAL;
  const tmMedioMesesFechados = mesesFechados.length>0
    ? mesesFechados.reduce((a,m)=>a+(m.fat/4),0)/mesesFechados.length / 1000 // proxy grosseiro, so para tendencia
    : 0;

  if(pctMesProj >= 100){
    alertasMensal.push({tipo:'gr', msg:`<strong>📅 ${MES_ATUAL}:</strong> projeção de ${fr(GERAL.fat_total_proj)} (${pctMesProj}% da meta), com ${semanasRestantes} semana${semanasRestantes===1?'':'s'} restante${semanasRestantes===1?'':'s'}. Mês praticamente garantido — manter o ritmo.`});
  } else if(pctMesProj >= 90){
    alertasMensal.push({tipo:'ye', msg:`<strong>📅 ${MES_ATUAL}:</strong> projeção em ${pctMesProj}% da meta. Falta ${fr(META_MES_GERAL-GERAL.fat_total_proj)} para bater — totalmente recuperável em ${semanasRestantes===0?'nenhuma semana (mês já encerrado)':semanasRestantes+' semana(s) restante(s)'}.`});
  } else {
    alertasMensal.push({tipo:'re', msg:`<strong>📅 ${MES_ATUAL}:</strong> projeção em apenas ${pctMesProj}% da meta (${fr(GERAL.fat_total_proj)} de ${fr(META_MES_GERAL)}). Com ${semanasRestantes} semana(s) restante(s), recuperar isso exige reforço real, não só manter o ritmo atual.`});
  }

  // Comparar ticket médio do mês com a tendência dos últimos meses fechados (se houver dado suficiente)
  if(mesesFechados.length >= 2){
    const ultimoFechado = mesesFechados[mesesFechados.length-1];
    const penultimoFechado = mesesFechados[mesesFechados.length-2];
    if(ultimoFechado.fat > penultimoFechado.fat * 1.05){
      alertasMensal.push({tipo:'gr', msg:`Faturamento vem em trajetória de alta: ${penultimoFechado.m} (${fr(penultimoFechado.fat)}) → ${ultimoFechado.m} (${fr(ultimoFechado.fat)}). Se ${MES_ATUAL} mantiver isso, o trimestre fecha forte.`});
    } else if(ultimoFechado.fat < penultimoFechado.fat * 0.92){
      alertasMensal.push({tipo:'ye', msg:`Atenção: ${ultimoFechado.m} caiu em relação a ${penultimoFechado.m} (${fr(penultimoFechado.fat)} → ${fr(ultimoFechado.fat)}). Vale entender se ${MES_ATUAL} está revertendo essa queda ou confirmando uma tendência.`});
    }
  }

  /* ============================================================
     CAMADA 3 — POR LOJA: meta do mês, TM, e padrão de risco
  ============================================================ */
  // Ordenar lojas por % de projeção (das piores para as melhores) para priorizar atenção
  const lojasOrdenadas = [...NOMES].sort((a,b)=>pct(LOJAS[a].fat_total,LOJAS[a].meta)-pct(LOJAS[b].fat_total,LOJAS[b].meta));

  lojasOrdenadas.forEach(n=>{
    const l=LOJAS[n];
    const pctProj = pct(l.fat_total,l.meta);
    const faltaReal = Math.max(0,l.meta-l.fat_real);

    if(pctProj < 70){
      alertasLojas.push({tipo:'re', msg:`<strong>${n}</strong> é a maior preocupação agora: projeção de apenas ${pctProj}% da meta (${fr(l.fat_total)} de ${fr(l.meta)}). Faltam ${fr(faltaReal)} no real acumulado — vale entender se é problema de fluxo de clientes, equipe, ou alguma campanha que não engatou.`});
    } else if(pctProj < 90){
      alertasLojas.push({tipo:'ye', msg:`<strong>${n}</strong> projeta ${pctProj}% da meta. Recuperável nas semanas restantes, mas precisa de empurrão — não vai se resolver só com o ritmo atual.`});
    } else if(pctProj < 100){
      alertasLojas.push({tipo:'ye', msg:`<strong>${n}</strong> está quase lá: projeção de ${pctProj}% da meta (faltam só ${fr(l.meta-l.fat_total)}). Um pequeno esforço extra nas semanas restantes garante a meta.`});
    } else {
      alertasLojas.push({tipo:'gr', msg:`<strong>${n}</strong> está tranquila: projeção de ${pctProj}% da meta (${fr(l.fat_total)}). ${pctProj>=115?'Vale entender o que está funcionando aqui para replicar nas demais lojas.':''}`});
    }

    // Produto vs Servico - identificar QUAL dos dois está puxando a loja pra baixo
    const pctProd = pct(l.prodRealAcum, l.prodMetaMes);
    const pctServ = pct(l.servRealAcum, l.servMetaMes);
    if(pctProj < 95 && Math.abs(pctProd-pctServ) > 25){
      const fraco = pctProd < pctServ ? 'Produto' : 'Serviço';
      const fracoVal = pctProd < pctServ ? pctProd : pctServ;
      alertasLojas.push({tipo:'ye', msg:`Em <strong>${n}</strong>, o gargalo é específico: ${fraco} está em ${fracoVal}% da meta enquanto o outro lado está bem melhor. Cobrar a equipe focado nesse ponto específico, não no faturamento total.`});
    }

    // TM em queda ao longo das semanas reais (sinal de perda de força de venda, nao so de volume)
    if(l.tm.length >= 2){
      const tmPrimeira = l.tm[0];
      const tmUltima = l.tm[l.tm.length-1];
      if(tmUltima < tmPrimeira * 0.85){
        alertasLojas.push({tipo:'ye', msg:`Ticket médio de <strong>${n}</strong> caiu de R$ ${tmPrimeira.toFixed(0)} (S1) para R$ ${tmUltima.toFixed(0)} (última semana). Pode ser sazonalidade, mas vale checar se a equipe está empurrando produtos de menor valor.`});
      } else if(tmUltima > tmPrimeira * 1.20){
        alertasLojas.push({tipo:'gr', msg:`Ticket médio de <strong>${n}</strong> subiu de R$ ${tmPrimeira.toFixed(0)} para R$ ${tmUltima.toFixed(0)} ao longo do mês — sinal de que a equipe está vendendo melhor, não só mais.`});
      }
    }
  });

  // Destaque comparativo entre a melhor e a pior loja do mes - util para reuniao de equipe
  const melhorLoja = lojasOrdenadas[lojasOrdenadas.length-1];
  const piorLoja = lojasOrdenadas[0];
  const gapPct = pct(LOJAS[melhorLoja].fat_total,LOJAS[melhorLoja].meta) - pct(LOJAS[piorLoja].fat_total,LOJAS[piorLoja].meta);
  if(gapPct > 40){
    alertasLojas.push({tipo:'ye', msg:`Gap grande entre lojas este mês: <strong>${melhorLoja}</strong> (${pct(LOJAS[melhorLoja].fat_total,LOJAS[melhorLoja].meta)}%) vs <strong>${piorLoja}</strong> (${pct(LOJAS[piorLoja].fat_total,LOJAS[piorLoja].meta)}%). Vale entender o que ${melhorLoja} está fazendo diferente.`});
  }

  return`<div class="box"><div class="bt">📊 Diagnóstico Anual — ${MES_ATUAL}, Semana ${SEM_ATUAL}</div>
    ${alertasAnual.map(a=>`<div class="ins ${a.tipo}">${a.msg}</div>`).join('')}
  </div>

  <div class="box"><div class="bt">📅 Diagnóstico Mensal — ${MES_ATUAL}</div>
    ${alertasMensal.map(a=>`<div class="ins ${a.tipo}">${a.msg}</div>`).join('')}
  </div>

  <div class="box"><div class="bt">🏪 Diagnóstico por Loja — Semana ${SEM_ATUAL}</div>
    ${alertasLojas.map(a=>`<div class="ins ${a.tipo}">${a.msg}</div>`).join('')}
  </div>

  <div class="box"><div class="bt">O que precisa acontecer nas semanas restantes</div>
  <table><thead><tr><th>Loja</th><th>Real Acumulado</th><th>Meta</th><th>Falta para meta</th><th>Já faturou assim antes?</th></tr></thead>
  <tbody>${NOMES.map(n=>{
    const l=LOJAS[n];
    const falta=Math.max(0,l.meta-l.fat_real);
    const hist_med = (l.hist_s3.reduce((a,b)=>a+b,0)+l.hist_s4.reduce((a,b)=>a+b,0))/(l.hist_s3.length+l.hist_s4.length)*2;
    const viavel = falta<=hist_med*1.2;
    const folgaPct = falta>0 ? Math.round((falta/hist_med)*100) : 0;
    return`<tr>
      <td><strong>${n}</strong></td>
      <td>${fr(l.fat_real)}</td>
      <td class="d">${fr(l.meta)}</td>
      <td class="${falta===0?'g':'y'}">${fr(falta)}</td>
      <td>${falta===0
        ? '<span class="bdg bg">✓ Meta já batida</span>'
        : (viavel
            ? `<span class="bdg bg">✓ Sim</span> <span style="font-size:9px;color:#666">(precisa de ${folgaPct}% da média histórica dessas semanas)</span>`
            : `<span class="bdg br2">⚠ Seria recorde</span> <span style="font-size:9px;color:#666">(precisaria de ${folgaPct}% da média histórica — bem acima do normal)</span>`)}
      </td>
    </tr>`;}).join('')}</tbody></table>
  <div style="font-size:10px;color:#444;margin-top:6px">Compara o quanto falta para a meta com o que essa loja já faturou, em média, nas mesmas semanas dos últimos 5 meses. "Seria recorde" não significa impossível — significa que exigiria um resultado melhor do que o histórico recente.</div>
  </div>`;
}
};

/* =========== DADOS ANUAIS =========== */
const META_ANO = 3000000;

V.anual = function(){
  const fat_jan_mai = REAL_MESES.slice(0,5).reduce((a,d)=>a+d.fat,0);
  const fat_acum_real = fat_jan_mai + GERAL.fat_real;
  const fat_jun_proj  = JUNHO_PROJ_TOTAL;
  const fat_1sem      = fat_jan_mai + fat_jun_proj;
  const ritmo_mensal  = fat_jan_mai / 5;

  const tot2r = PROJ_2SEM.reduce((a,d)=>a+d.r,0);
  const tot2o = PROJ_2SEM.reduce((a,d)=>a+d.o,0);
  const anoR  = fat_1sem + tot2r;
  const anoO  = fat_1sem + tot2o;

  function barAno(real, proj, meta, corProj){
    const maxV = Math.max(real+proj, meta)*1.02;
    const pr = Math.min(real/maxV*100,100);
    const pp = Math.min(proj/maxV*100, 100-pr);
    const pm = Math.min(meta/maxV*100,100);
    const total = real+proj;
    const cTotal = cor(total,meta);

    // Checkpoint: onde deveria estar HOJE se o ritmo fosse linear até a meta
    const hoje = new Date();
    const inicioAno = new Date(hoje.getFullYear(), 0, 1);
    const fimAno    = new Date(hoje.getFullYear(), 11, 31);
    const diaDoAno  = Math.floor((hoje - inicioAno) / 86400000);
    const totalDias = Math.floor((fimAno - inicioAno) / 86400000);
    const fracaoAno = diaDoAno / totalDias;
    const metaEsperadaHoje = meta * fracaoAno;
    const pCheckpoint = Math.min(metaEsperadaHoje/maxV*100, 100);
    const noRitmo = real >= metaEsperadaHoje;

    return`<div class="prog-wrap" style="height:32px;margin-bottom:6px;margin-top:18px;overflow:visible">
      <div class="prog-real" style="width:${pr}%;font-size:12px;${estiloGradienteBarra(real,meta)}">${real>0?fr(real):''}</div>
      <div class="prog-proj" style="left:${pr}%;width:${pp}%;background:repeating-linear-gradient(45deg,${corProj}aa,${corProj}aa 4px,${corProj}44 4px,${corProj}44 8px)">${proj>0?'+'+fr(proj):''}</div>
      <div class="prog-meta" style="left:${pm}%"></div>
      <div style="position:absolute;top:-4px;left:${pCheckpoint}%;width:2px;height:40px;background:${noRitmo?'#5dca6a':'#fff'};box-shadow:0 0 3px rgba(255,255,255,.6)" title="Ritmo esperado para ${MES_ATUAL}"></div>
      <div style="position:absolute;top:-16px;left:${pCheckpoint}%;transform:translateX(-50%);font-size:9px;color:${noRitmo?'#5dca6a':'#ddd'};white-space:nowrap">↓ ${MES_ATUAL.substring(0,3)}</div>
      <div class="prog-lbl" style="font-size:11px;color:${cTotal}">${pct(total,meta)}% → ${fr(total)}</div>
    </div>`;
  }

  return`
  <div class="cards">
    <div class="card"><div class="lb">Acumulado Real (Jan–Jun S2)</div><div class="vl" style="color:#f39c12">${fr(fat_acum_real)}</div><div class="sb">${pct(fat_acum_real,META_ANO)}% da meta anual</div></div>
    <div class="card"><div class="lb">1º Semestre (c/ Jun proj.)</div><div class="vl" style="color:#eee">${fr(fat_1sem)}</div><div class="sb">Junho projetado: ${fr(fat_jun_proj)}</div></div>
    <div class="card"><div class="lb">Meta Anual</div><div class="vl" style="color:#cc0000">${fr(META_ANO)}</div><div class="sb">falta ${fr(META_ANO-fat_acum_real)} realizar</div></div>
    <div class="card"><div class="lb">Ritmo Mensal Atual</div><div class="vl" style="color:#eee">${fr(ritmo_mensal)}</div><div class="sb">média Jan–Mai fechados</div></div>
    <div class="card"><div class="lb">🟡 Fechamento Realista</div><div class="vl" style="color:#f39c12">${fr(anoR)}</div><div class="sb">${pct(anoR,META_ANO)}% da meta R$ 3M</div></div>
    <div class="card"><div class="lb">🟢 Fechamento Otimista</div><div class="vl" style="color:#2ecc71">${fr(anoO)}</div><div class="sb">${pct(anoO,META_ANO)}% da meta R$ 3M</div></div>
  </div>

  <div class="box"><div class="bt">Progresso Anual — Real + Projeção vs Meta R$ 3M</div>
    <div style="font-size:11px;color:#f39c12;margin-bottom:6px;font-weight:bold">🟡 Realista — ${fr(anoR)} (${pct(anoR,META_ANO)}%)</div>
    ${barAno(fat_acum_real, anoR-fat_acum_real, META_ANO,'#cc8800')}
    <div style="font-size:11px;color:#2ecc71;margin-bottom:6px;font-weight:bold;margin-top:14px">🟢 Otimista — ${fr(anoO)} (${pct(anoO,META_ANO)}%)</div>
    ${barAno(fat_acum_real, anoO-fat_acum_real, META_ANO,'#1a7a3a')}
    <div style="font-size:10px;color:#444;margin-top:8px">
      <span style="color:#cc0000">■</span> Real acumulado (${fr(fat_acum_real)}) &nbsp;
      <span style="color:#888">▤</span> Projeção restante &nbsp;
      <span style="color:#777">│</span> Meta R$ 3M
    </div>
  </div>

  <div class="box"><div class="bt">Faturamento Jan–Dez — Todas as Lojas</div>
  ${buildGraficoAnualBarras(montarSerieMensalGeral(), [
    {valor: 210000, label: 'Meta', cor: '#f39c12'},
    {valor: 250000, label: 'Meta máx.', cor: '#2ecc71'}
  ])}
  </div>

  <div class="box"><div class="bt">Projeção Mês a Mês — Cenário Otimista 2026</div>
  <table><thead><tr><th>Mês</th><th>Faturamento</th><th>Meta Mês</th><th>% Meta</th><th>Acumulado Ano</th><th>% Meta R$ 3M</th><th>Status</th></tr></thead>
  <tbody>
    ${REAL_MESES.map((d,i)=>{
      const fatMes = d.fechado ? d.fat : fat_jun_proj;
      const acum   = REAL_MESES.slice(0,i).reduce((a,x)=>a+(x.fechado?x.fat:fat_jun_proj),0) + fatMes;
      const cMes   = d.fechado ? cor(d.fat,d.meta) : cor(fat_jun_proj,d.meta);
      const isProj = !d.fechado;
      return`<tr style="${isProj?'background:#1a1200':''}">
        <td><strong>${d.m}</strong>${isProj?' <span style="font-size:9px;color:#f39c12">(proj.)</span>':''}</td>
        <td style="color:${cMes};font-weight:bold">${fr(fatMes)}</td>
        <td class="d">${fr(d.meta)}</td>
        <td style="color:${cMes};font-weight:bold">${pct(fatMes,d.meta)}%</td>
        <td style="font-weight:bold">${fr(acum)}</td>
        <td style="color:${acum/META_ANO>.66?'#2ecc71':acum/META_ANO>.33?'#f39c12':'#e74c3c'}">${pct(acum,META_ANO)}%</td>
        <td>${d.fechado?bdg(d.fat,d.meta):'<span class="bdg by">⚡ Jun proj.</span>'}</td>
      </tr>`;
    }).join('')}
    ${PROJ_2SEM.map((d,i)=>{
      const acum_ate = fat_1sem + PROJ_2SEM.slice(0,i+1).reduce((a,x)=>a+x.o,0);
      const cMes = cor(d.o,d.meta);
      return`<tr style="background:#001a08">
        <td><strong>${d.m}</strong> <span style="font-size:9px;color:#2ecc71">🟢 otimista</span></td>
        <td style="color:#2ecc71;font-weight:bold">${fr(d.o)}</td>
        <td class="d">${fr(d.meta)}</td>

/* =========== CALCULADORA PAYJOY (sub-aba de Loja/Operacional) =========== */
let payjoyState = {};
let payjoyScreenHtml = '';

function pjFmt(v){ return 'R$ ' + Number(v).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function pjEscolherEmbutido(valor, opcoes){ return opcoes.find(function(o){return o >= valor;}) || opcoes[opcoes.length-1]; }

function pjBtnRed(txt, fn){ return '<button class="btn-red" onclick="'+fn+'">'+txt+'</button>'; }
function pjBtnW(txt, fn){ return '<button class="btn-branco" onclick="'+fn+'">'+txt+'</button>'; }

function pjSvgCircleOff(){ return '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>'; }
function pjSvgCard(){ return '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>'; }
function pjSvgPhone(){ return '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8232A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>'; }
function pjSvgStore(){ return '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E8232A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l1-5h16l1 5"/><path d="M3 9h18v11a1 1 0 01-1 1H4a1 1 0 01-1-1V9z"/><line x1="9" y1="21" x2="9" y2="9"/><line x1="15" y1="21" x2="15" y2="9"/></svg>'; }

function pjRenderInto(html){
  payjoyScreenHtml = html;
  const el = document.getElementById('payjoy-screen');
  if(el) el.innerHTML = html;
}

function pjStep1(){
  payjoyState = {};
  pjRenderInto(
    '<div class="step-title">Calculadora Payjoy</div>'
    + '<div class="step-sub">Selecione o tipo de venda</div>'
    + '<div class="btn-group">'
    + '<button class="btn-option" onclick="pjEscolherModo(&#39;sem&#39;)">'+pjSvgCircleOff()+'<div><span class="opt-label">Sem entrada</span><span class="opt-desc">Cliente não paga entrada — valor é embutido no aparelho</span></div></button>'
    + '<button class="btn-option" onclick="pjEscolherModo(&#39;reduzida&#39;)">'+pjSvgCard()+'<div><span class="opt-label">Entrada reduzida</span><span class="opt-desc">Cliente paga parte da entrada — diferença é embutida no aparelho</span></div></button>'
    + '</div>'
  );
}

function pjEscolherModo(modo){ payjoyState.mode = modo; pjStep2(); }

function pjStep2(){
  const isSem = payjoyState.mode === 'sem';
  pjRenderInto(
    '<div class="step-indicator">Passo 1 de 3 — Dados iniciais</div>'
    + '<div class="step-title">'+(isSem?'Sem Entrada':'Entrada Reduzida')+'</div>'
    + '<div class="step-sub">Informe os valores do aparelho</div>'
    + '<div class="field"><label>Valor do aparelho (R$)</label><input type="number" id="pj-inp-aparelho" placeholder="Ex: 1300" min="0" step="0.01"></div>'
    + '<div class="field"><label>Entrada que a Payjoy pediu (R$)</label><input type="number" id="pj-inp-entrada" placeholder="Ex: 250" min="0" step="0.01"></div>'
    + (!isSem ? '<div class="field"><label>Quanto o cliente vai pagar de entrada (R$)</label><input type="number" id="pj-inp-cliente" placeholder="Ex: 150" min="0" step="0.01"></div>' : '')
    + pjBtnRed('Calcular','pjCalcularPasso2()')
    + pjBtnW('↩ Voltar ao início','pjStep1()')
  );
}

function pjCalcularPasso2(){
  const aparelho = parseFloat(document.getElementById('pj-inp-aparelho').value);
  const entrada  = parseFloat(document.getElementById('pj-inp-entrada').value);
  if(isNaN(aparelho) || isNaN(entrada)){ alert('Preencha todos os campos.'); return; }

  if(payjoyState.mode === 'sem'){
    if(entrada > 300){ pjRenderBloqueado('A entrada original é '+pjFmt(entrada)+', acima do limite de '+pjFmt(300)+' para venda sem entrada.'); return; }
    if(entrada <= 100){
      pjRenderResultado({
        payjoy_valor: aparelho, payjoy_nova_entrada: entrada,
        sistema_valor: aparelho, sistema_entrada: 0, sistema_desconto: entrada,
        detalhe: 'Entrada '+pjFmt(entrada)+' \u2264 R$ 100,00 \u2192 desconto direto no aparelho, sem embutir valor na Payjoy'
      });
      return;
    }
    const embutido = pjEscolherEmbutido(entrada, [100,150,200,250]);
    payjoyState.valorAparelho = aparelho;
    payjoyState.entradaOriginal = entrada;
    payjoyState.valorEmbutido = embutido;
    payjoyState.valorNaPayjoy = aparelho + embutido;
    pjStep3();
  } else {
    const cliente = parseFloat(document.getElementById('pj-inp-cliente').value);
    if(isNaN(cliente)){ alert('Preencha todos os campos.'); return; }
    const diferenca = entrada - cliente;
    if(diferenca <= 0){ alert('A entrada do cliente não pode ser igual ou maior que a entrada da Payjoy.'); return; }
    if(diferenca <= 100){
      pjRenderResultado({
        payjoy_valor: aparelho, payjoy_nova_entrada: entrada,
        sistema_valor: aparelho, sistema_entrada: cliente, sistema_desconto: diferenca,
        detalhe: 'Diferença '+pjFmt(diferenca)+' \u2264 R$ 100,00 \u2192 desconto direto no aparelho, sem embutir valor na Payjoy'
      });
      return;
    }
    if(diferenca > 300){ pjRenderBloqueado('A diferença a embutir seria '+pjFmt(diferenca)+', acima do limite de '+pjFmt(300)+'.'); return; }
    const embutido = pjEscolherEmbutido(diferenca, [100,150,200,250,300]);
    payjoyState.valorAparelho = aparelho;
    payjoyState.entradaOriginal = entrada;
    payjoyState.entradaCliente = cliente;
    payjoyState.valorEmbutido = embutido;
    payjoyState.valorNaPayjoy = aparelho + embutido;
    pjStep3();
  }
}

function pjStep3(){
  pjRenderInto(
    '<div class="step-indicator">Passo 2 de 3 — Consultar a Payjoy</div>'
    + '<div class="step-title">Digite na Payjoy</div>'
    + '<div class="step-sub">Use o valor abaixo no site da Payjoy</div>'
    + '<div class="alert alert-info"><strong style="color:#fff">Coloque este valor no site da Payjoy:</strong><br>'
    + '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:32px;color:#E8232A;letter-spacing:2px">'+pjFmt(payjoyState.valorNaPayjoy)+'</span>'
    + '<br><span style="font-size:12px;color:#bbb">('+pjFmt(payjoyState.valorAparelho)+' + '+pjFmt(payjoyState.valorEmbutido)+' embutidos)</span></div>'
    + '<div class="field"><label>Qual foi a nova entrada que a Payjoy mostrou? (R$)</label><input type="number" id="pj-inp-nova-entrada" placeholder="Ex: 270" min="0" step="0.01"></div>'
    + pjBtnRed('Ver resultado final','pjCalcularFinal()')
    + pjBtnW('← Voltar','pjStep2()')
  );
}

function pjCalcularFinal(){
  const novaEntrada = parseFloat(document.getElementById('pj-inp-nova-entrada').value);
  if(isNaN(novaEntrada)){ alert('Informe a nova entrada da Payjoy.'); return; }
  payjoyState.novaEntrada = novaEntrada;

  if(payjoyState.mode === 'sem'){
    const desconto = novaEntrada - payjoyState.valorEmbutido;
    if(desconto > 100){
      pjRenderBloqueado('O desconto necessário seria '+pjFmt(desconto)+' (nova entrada '+pjFmt(novaEntrada)+' \u2212 embutido '+pjFmt(payjoyState.valorEmbutido)+'), acima do limite de '+pjFmt(100)+'.');
      return;
    }
    pjRenderResultado({
      payjoy_valor: payjoyState.valorNaPayjoy, payjoy_nova_entrada: novaEntrada,
      sistema_valor: payjoyState.valorAparelho, sistema_entrada: 0, sistema_desconto: Math.max(0,desconto),
      detalhe: 'Nova entrada '+pjFmt(novaEntrada)+' \u2212 embutido '+pjFmt(payjoyState.valorEmbutido)+' = desconto '+pjFmt(Math.max(0,desconto))
    });
  } else {
    const desconto = novaEntrada - payjoyState.entradaCliente - payjoyState.valorEmbutido;
    if(desconto > 100){
      pjRenderBloqueado('O desconto necessário seria '+pjFmt(desconto)+' (nova entrada '+pjFmt(novaEntrada)+' \u2212 cliente '+pjFmt(payjoyState.entradaCliente)+' \u2212 embutido '+pjFmt(payjoyState.valorEmbutido)+'), acima do limite de '+pjFmt(100)+'.');
      return;
    }
    pjRenderResultado({
      payjoy_valor: payjoyState.valorNaPayjoy, payjoy_nova_entrada: novaEntrada,
      sistema_valor: payjoyState.valorAparelho, sistema_entrada: payjoyState.entradaCliente, sistema_desconto: Math.max(0,desconto),
      detalhe: 'Nova entrada '+pjFmt(novaEntrada)+' \u2212 cliente '+pjFmt(payjoyState.entradaCliente)+' \u2212 embutido '+pjFmt(payjoyState.valorEmbutido)+' = desconto '+pjFmt(Math.max(0,desconto))
    });
  }
}

function pjRenderResultado(r){
  pjRenderInto(
    '<div class="step-indicator">Resultado final</div>'

    + '<span class="tag-ok">✓ Venda liberada</span>'

    + '<div class="result-row"><span class="result-label">Entrada do cliente</span><span class="result-value">'+pjFmt(r.sistema_entrada)+'</span></div>'
    + '<div class="result-row"><span class="result-label">Desconto</span><span class="result-value green">'+pjFmt(r.sistema_desconto)+'</span></div></div>'
    + pjBtnW('↩ Voltar ao início','pjStep1()')
  );
}

  pjRenderInto(
    '<div class="step-title">Venda Bloqueada</div>'

    + '<div class="alert alert-error" style="margin-bottom:20px">'+motivo+'</div>'

let locLojaAtual = 'Esteio';
let locAbaAtual = 'capas'; // 'capas' | 'peliculas'
let locBuscaQ = '';

function locNorm(s){
  return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\biphone\b/g,'iph').replace(/\biph\b/g,'iph').trim();
}

function locSelecionarLoja(n){ locLojaAtual = n; locBuscaQ=''; document.getElementById('content').innerHTML = V.localizacao(); }
function locSelecionarAba(a){ locAbaAtual = a; document.getElementById('content').innerHTML = V.localizacao(); }
function locBuscar(v){
  locBuscaQ = v;
  const el = document.getElementById('content');
  el.innerHTML = V.localizacao();
  const inp = document.getElementById('loc-busca-input');
  if(inp){ inp.focus(); inp.setSelectionRange(v.length,v.length); }
}
function locLimpar(){ locBuscaQ=''; document.getElementById('content').innerHTML = V.localizacao(); }

function locRenderCard(item, padrao){
  const modeloPrincipal = item.modelos[0];
  const alternativos = item.modelos.slice(1).filter(Boolean);
  let linhas = '';
  if(padrao === 'B'){
    const tem = item.locNormal && item.locNormal !== '-';
    linhas = '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0">'
      + '<span style="font-size:11px;color:#888">Localização</span>'
      + (tem ? '<span style="color:#fff;font-size:15px;font-weight:bold">'+item.locNormal+'</span>'
             : '<span style="color:#666;font-size:11px">—</span>')
      + '</div>';
  } else {
    const temN = item.locNormal && item.locNormal !== '-';
    const temC = item.locCarteira && item.locCarteira !== '-';
    linhas = '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #333">'
      + '<span style="font-size:11px;color:#888">Capa Normal</span>'
      + (temN ? '<span style="color:#fff;font-size:15px;font-weight:bold">'+item.locNormal+'</span>'
              : '<span style="color:#666;font-size:11px">—</span>')
      + '</div>'
      + '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0">'
      + '<span style="font-size:11px;color:#888">Capa Carteira</span>'
      + (temC ? '<span style="color:#fff;font-size:15px;font-weight:bold">'+item.locCarteira+'</span>'
              : '<span style="color:#666;font-size:11px">—</span>')
      + '</div>';
  }
  if(item.tabletTem){
    linhas += '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid #333;margin-top:4px">'
      + '<span style="font-size:11px;color:#888">Tablet</span>'
      + '<span style="color:#5dca6a;font-size:12px;font-weight:bold">✓ TEM'+(item.tabletLoc?' — '+item.tabletLoc:'')+'</span>'
      + '</div>';
  }
  return '<div style="background:#262626;border:1px solid #555;border-radius:8px;padding:13px 15px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.3)">'
    + '<div style="font-weight:bold;color:#fff;font-size:16px;margin-bottom:6px">'+modeloPrincipal+'</div>'
    + (alternativos.length ? '<div style="font-size:10px;color:#999;margin-bottom:8px">Serve também: '+alternativos.join(' · ')+'</div>' : '')
    + linhas
    + '</div>';
}

V.localizacao = function(){
  const lojaData = LOC_DATA[locLojaAtual] || {capas:[],peliculas:[],padrao:'A'};
  const lista = locAbaAtual === 'capas' ? lojaData.capas : lojaData.peliculas;
  const q = locNorm(locBuscaQ);
  const filtrados = q ? lista.filter(function(item){
    return item.modelos.some(function(m){ return locNorm(m).indexOf(q) >= 0; });
  }) : lista;

  const semDados = lista.length === 0;

  let conteudoHtml;
  if(semDados){
    conteudoHtml = '<div style="text-align:center;color:#555;padding:50px 20px;font-size:13px">📋 Ainda não há dados de '+(locAbaAtual==='capas'?'capas':'películas')+' cadastrados para '+locLojaAtual+'.<br><span style="font-size:11px;color:#444">Envie a planilha Excel dessa loja para o assistente processar.</span></div>';
  } else if(!locBuscaQ){
    conteudoHtml = '<div style="text-align:center;color:#555;padding:40px 20px;font-size:13px">🔍 Digite um modelo para buscar a localização.</div>';
  } else if(filtrados.length === 0){
    conteudoHtml = '<div style="text-align:center;color:#666;padding:40px 20px;font-size:13px">Nenhum modelo encontrado para "'+locBuscaQ+'".</div>';
  } else {
    conteudoHtml = filtrados.map(function(item){ return locRenderCard(item, lojaData.padrao); }).join('');
  }

  return '<div class="box"><div class="bt">📍 Localização de Capas e Películas</div>'
    + '<div style="margin-bottom:10px">'
    + '<div style="font-size:10px;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px">Selecione a loja:</div>'
    + '<div class="loja-btns">' + NOMES.map(function(n){
        return '<div class="lbtn'+(n===locLojaAtual?' on':'')+'" onclick="locSelecionarLoja(&#39;'+n+'&#39;)">'+n+'</div>';
      }).join('') + '</div>'
    + '</div>'
    + '<div style="display:flex;justify-content:center;gap:10px;margin-bottom:14px">'
    + '<div onclick="locSelecionarAba(&#39;capas&#39;)" style="padding:10px 24px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;text-align:center;'+(locAbaAtual==='capas'?'background:#cc0000;border:1px solid #cc0000;color:#fff':'background:#1a1a1a;border:1px solid #333;color:#999')+'">🛡️ Capas</div>'
    + '<div onclick="locSelecionarAba(&#39;peliculas&#39;)" style="padding:10px 24px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;text-align:center;'+(locAbaAtual==='peliculas'?'background:#cc0000;border:1px solid #cc0000;color:#fff':'background:#1a1a1a;border:1px solid #333;color:#999')+'">📱 Películas</div>'
    + '</div>'
    + (semDados ? '' :
        '<div style="margin-bottom:14px">'
        + '<input type="text" id="loc-busca-input" placeholder="Ex: iPhone 13, A54, G32..." value="'+locBuscaQ.replace(/"/g,'&quot;')+'" '
        + 'oninput="locBuscar(this.value)" '
        + 'style="width:100%;padding:10px 12px;background:#1a1a1a;border:1px solid #333;border-radius:5px;color:#eee;font-size:13px;margin-bottom:8px">'
        + (locBuscaQ ? '<button onclick="locLimpar()" style="padding:6px 14px;background:#222;border:1px solid #333;border-radius:5px;color:#aaa;font-size:11px;cursor:pointer">Limpar busca</button>' : '')
        + '</div>')
    + '<div style="max-height:520px;overflow-y:auto">'+conteudoHtml+'</div>'
    + '</div>';
};

  const mesesNomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

/* =========== CONTROLES =========== */
// Grupos do menu principal: cada grupo tem um id, label do botao grande, e a lista de sub-abas
const GRUPOS = {
  operacional: {
    label: '📱 Loja/Operacional',
    subTabs: ['localizacao','assistencia','payjoy'],
    subLbls: ['📍 Localização Capas/Películas','🔧 Consulta de Assistência','💳 Calculadora Payjoy']
  },
  resultados: {
    label: '📊 Resultados',
    subTabs: ['anual','mes','loja','alertas'],
    subLbls: ['📊 Resultado Anual','📅 Mês Atual','🏪 Por Loja','🚨 Alertas']
  }
};
const ORDEM_GRUPOS = ['operacional','resultados'];

function selLoja(n){curLoja=n;document.getElementById('content').innerHTML=V.loja();}

// Descobre a qual grupo uma sub-aba pertence
function grupoDaTab(t){
  for(var g in GRUPOS){ if(GRUPOS[g].subTabs.indexOf(t) >= 0) return g; }
  return ORDEM_GRUPOS[0];
}

function render(){
  const badgeEl = document.getElementById('semana-badge-txt');
  if(badgeEl) badgeEl.innerHTML = '📅 '+MES_ATUAL.toUpperCase()+' 2026 — SEMANA '+SEM_ATUAL+' DE 4';

  const header = document.getElementById('app-header');
  const mainNavEl = document.getElementById('main-nav-container');

  if(curTab === 'home'){
    header.style.display = 'none';
    document.getElementById('content').innerHTML = V.home();
    return;
  }

  header.style.display = 'block';
  const grupoAtual = grupoDaTab(curTab);

  // Linha de navegacao principal: botao home + os 2 botoes grandes de grupo
  mainNavEl.innerHTML = '<div class="main-nav">'
    + '<div class="home-btn-mini" onclick="goTab(&#39;home&#39;)" title="Voltar ao início">🏠</div>'
    + ORDEM_GRUPOS.map(function(g){
        return '<div class="main-btn'+(g===grupoAtual?' on':'')+'" onclick="goGrupo(&#39;'+g+'&#39;)">'+GRUPOS[g].label+'</div>';
      }).join('')
    + '</div>';

  // Sub-abas do grupo atual (estilo discreto que já existia)
  const grupo = GRUPOS[grupoAtual];
  document.getElementById('tabs').innerHTML =
    grupo.subTabs.map((t,i)=>`<div class="tab${t===curTab?' on':''}" onclick="goTab('${t}')">${grupo.subLbls[i]}</div>`).join('');

  document.getElementById('content').innerHTML = V[curTab]();
}

// Clicar num botao principal leva para a primeira sub-aba daquele grupo
function goGrupo(g){
  curTab = GRUPOS[g].subTabs[0];
  render();
}

function goTab(t){curTab=t;render();}
curTab = 'home';
render();
</script>
